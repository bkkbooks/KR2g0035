body:
  text: 古今列女傳卷三明解縉等撰周列國齊義繼母者齊二子之母也當宣王時有人鬬死於道者吏訊之被一創音瘡二子兄弟立其傍吏問之兄曰我殺之弟曰非兄也乃我殺之期年吏不能决言之於相相不能决言之於王王曰今皆赦之是縱有罪也皆殺之是誅無辜也寡人度其母能知子善惡試問其母聽其所欲殺活相召其母問曰母之子殺人兄弟欲相代死吏不能决言之於王王有仁惠故問母何所欲殺活其母泣而對曰殺其少者相受其言因而問之曰夫少子者人之所愛也今欲殺之何也其母對曰少者妾之子也長者前妻之子也其父疾且死之時屬音燭之於妾曰善養視之妾曰諾今既受人之託許人以諾豈可以忘人之託而不信其諾耶且殺兄活弟是以私愛廢公義也背言忘信是欺死者也夫言不約束已諾不分何以居於世哉子雖痛乎獨謂行何泣下沾襟相入言於王王美其義髙其行皆赦不殺而尊其母號曰義母君子謂義母信而好義潔而有讓詩曰愷開上聲悌音弟君子四方為則此之謂也齊傷槐女者傷槐衍之女也名婧音凊景公有所愛槐使人守之植木懸之下令曰犯槐者刑傷槐者死於是衍醉而傷槐景公聞之曰是先犯我令使吏拘之且加罪焉婧懼乃造於相晏子晏平仲也之門曰賤妾不勝其欲願得備數於下晏子聞之笑曰嬰其有淫色乎何為老而見奔殆有說內之至哉既入門晏子望見之曰怪哉有深憂進而問焉對曰妾父衍幸得充城郭為公民見隂陽不調風雨不時五榖不滋之故禱祠於名山神水不勝麴音曲蘖音孽之味先犯君令醉至於此罪固當死妾聞明君之蒞離去聲國也不損祿而加刑又不以私恚害公法不為六畜傷民人不為野草傷禾苗昔者宋景公之時大旱三年不雨召太卜而卜之曰當以人祀之景公乃降堂北面稽首曰吾所以請雨者乃為吾民也今必當以人祀寡人請自當之言未卒天大雨方千里所以然者何也以能順天慈民也今吾君樹槐令犯者死欲以槐之故殺婧之父孤妾之身妾恐傷執政之法而害明君之義也鄰國聞之皆謂君愛樹而賤人其可乎晏子惕然而悟明日朝謂景公曰嬰聞之窮民財力謂之暴𫀆去聲崇玩好威嚴令謂之逆刑殺不正謂之賊夫三者守國之大殃也今君窮民財力以美飲食之具繁音煩鐘鼓之樂極宫室之觀行暴之大者也崇玩好威嚴令是逆民之明者也犯槐者刑傷槐者死刑殺不正賊民之深者也公曰寡人敬受命晏子出景公即時命罷守槐之役拔植懸之木廢傷槐之法出犯槐之囚君子曰傷槐女能以辭免詩云是究是圖亶丹上聲其然乎此之謂也母師者魯九子之寡母也臘日休作者嵗祀禮事畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多幼稚嵗時禮不理吾從汝謁往監之諸子皆頓首許諾又召諸婦曰婦人有三從之義而無專制之行少繫父母長繫於夫老繫於子今諸子許我歸視私家雖踰正禮願與少子俱以備婦人出入之制諸婦其慎房户之守吾夕而返於是使少子僕歸辦家事天隂還失早至閭外而止夕而入魯大夫從臺上見而怪之使人間視其居處禮節甚修家事甚理使者還以狀對於是大夫召母而問之曰一日從北方來至閭而止良久夕乃入吾不知其故甚怪之是以問也母對曰妾不幸早失夫獨與九子居臘月禮畢事間從諸子謁歸視私家與諸婦孺子期夕而返妾恐其酺音蒲醵音詎醉飽人情所有也妾返太早故止閭外期盡而入大夫美之言於穆公賜母尊號曰母師使明請夫人夫人諸姬音肌皆師之君子謂母師能以身教夫禮婦人未嫁則以父母為天既嫁則以夫為天其喪父母則降服一等無二天之義也詩云出宿于濟飲餞音賤于禰泥上聲女子有行遠父母兄弟此之謂也魯黔音鉗婁先生之妻也先生死曽子與門人往弔之其妻出户曽子弔之上堂見先生之尸在牖下枕墼音擊席槀髙上聲緼云去聲袍不表覆以布被手足不盡斂覆頭則足見覆足則頭見曽子曰斜引其被則斂矣妻曰斜而有餘不如正而不足也先生以不斜之故能至於此生時不邪死而邪之非先生意也曽子不能應遂哭之曰嗟乎先生之終也何以為諡音示其妻曰以康為諡曽子曰先生在時食不充口衣不蓋形死則手足不斂旁無酒肉生不得其美死不得其榮何樂於此而諡為康乎其妻曰昔先生君嘗欲授之政以為國相辭而不為是有餘貴也君嘗賜之粟三十鍾先生辭而不受是有餘富也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不欣欣於富貴求仁而得仁求義而得義其諡曰康不亦宜乎曽子曰唯斯人也而有斯婦君子謂黔婁妻為樂貧行道詩曰彼美淑姬可與寤音悟言此之謂也魯義姑姊者魯野之婦人也齊攻魯至郊望見一婦人抱一兒携音畦一兒而行軍且及之棄其所抱抱其所携而走於山兒隨而啼婦人遂行不顧齊將問兒曰走者爾母耶曰是也母所抱者誰也曰不知也齊將乃追之軍士引弓將射音石之曰止不止吾將射爾婦人乃還齊將問所抱者誰也所棄者誰也對曰所抱者妾兄之子也所棄者妾之子也見軍之至力不能兩護音互故棄妾之子齊將曰子之於母其親愛也痛甚於心今釋之而反抱兄之子何也婦人曰已之子私愛也兄之子公義也夫背公義而嚮私愛亡兄子而存妾子幸而得幸則魯君不吾畜大夫不吾養庶民國人不吾與也夫如是則脅音協肩無所容而纍足無所履也子雖痛乎獨謂義何故忍棄子而行義不能無義而視魯國於是齊將按兵而止使人言於齊君曰魯未可伐也乃至於境山澤之婦人耳猶知持節行義不以私害公而况於朝臣士大夫乎請還齊君許之魯君聞之賜婦人束帛百端號曰義姑姊公正誠信果於行義夫義其大哉雖在匹婦國猶賴之况以禮義治國乎詩云有覺德行四國順之此之謂也女宗者宋鮑蘇之妻也養姑甚謹鮑蘇仕衛三年而娶外妻女宗養姑愈敬因往來者請問其夫賂遺外妻甚厚女宗姒謂曰可以去矣女宗曰何故姒曰夫人既有所好子何留乎女宗曰婦人一醮焦去聲不改夫死不嫁執麻枲音徙治絲繭肩上聲織紝音壬組音祖紃音旬以供衣服以事夫室徹漠酒醴羞饋食以事舅姑以專一為貞以善從為順豈以専夫室之愛為善哉若其以淫意為心而扼夫室之好吾未知其善也夫禮天子十二諸侯九卿大夫三士二今吾夫誠士也有二不亦宜乎且婦人有七見去夫無一去義七去之道妬正為首淫僻竊盜長舌驕侮無子惡病皆在其後吾姒不教吾以居室之禮而反欲使吾為見棄之行將安所用此遂不聽事姑愈謹宋公聞之表其閭號曰女宗君子謂女宗謙而知禮詩云令儀令色小心翼翼古訓是式威儀是力此之謂也弓工妻者晉繁人之妻也當平公之時使其夫為弓三年乃成平公引弓而射不穿一札平公怒將殺弓人弓人之妻請見曰繁人之子弓人之妻也願有謁於君平公見之妻曰君聞昔者公劉之行乎羊牛踐葭音家葦韋上聲惻然為民痛之恩及草木豈欲殺不辜者乎秦穆公有盜食其駿音俊馬之肉反飲之以酒楚莊王臣援其夫人之衣而絶纓與飲大樂此三君者仁著於天下卒享其報名埀至今昔帝堯茅茨不剪采椽不斫土階三等猶以為為之者勞居之者逸也今妾之夫治造此弓其為之亦勞其幹生於太山之阿一日三覩隂三覩陽傅以燕牛之角纒以荆麋之筋糊以阿魚之膠此四者皆天下之妙選也而君不能以穿一札是君之不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此蓋射之道也平公以其言而射穿七札繁人之夫立得出而賜金三鎰君子謂弓工妻可與處難詩曰敦音凋弓既堅舍矢既鈞言射之有法也蔡人之妻者宋人之女也既嫁於蔡而夫有惡疾其母將改嫁之女曰夫不幸乃妾之不幸也奈何去之適人之道一與之醮終身不改不幸遇惡疾不改其意且夫采采芣音浮苡之草雖其臭惡猶始於捋鸞入聲采之終於懷擷賢入聲之浸以益親况於夫婦之道乎彼無大故又不遣妾何以得去終不聽其母乃作芣苡之詩君子曰宋女之意甚貞而一也鄒孟軻之母也號孟母其舍近墓孟子之少也嬉遊為墓間之事踴躍築埋孟母曰此非吾所以居處子也乃去舍市傍其嬉戲為賈人衒賣之事孟母又曰此非吾所以居處子也復徙舍學宫之傍其嬉遊乃設俎豆揖讓進退孟母曰真可以居吾子矣遂居及孟子長學六藝卒成大儒之名君子謂孟母善以漸化詩云彼姝者子何以豫之此之謂也孟子之少也既學而歸孟母方績問曰學所至矣孟子曰自若也孟母以刀斷其織孟子懼問其故孟母曰子之廢學若吾斷斯織也夫君子學以立名問則廣知是以居則安寧動則遠害今而廢之是不免於厮役而無以離於禍患也何以異於織績而食中道廢而不為寧能衣其夫子而長不乏糧食哉女則廢其所食男則惰於修德不為竊盜則為虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒君子謂孟母知為人母之道矣詩曰彼姝者子何以告之此之謂也孟子既娶將入私室其婦袒音坦而在內孟子不悅遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊惰在室而夫子見妾勃然不悅是客妾也婦人之義蓋不客宿請歸父母於是孟母召孟子而謂之曰夫禮將入門問孰存所以致敬也將上堂聲必揚所以戒人也將入户視必下恐見人過也今子不察於禮而責禮於人不亦遠乎孟子遂留其婦君子謂孟母知禮而明於姑母之道孟子處齊而有憂色孟母見之曰子若有憂色何也孟子曰不敏異日閒居擁楹而歎孟母見之曰鄉見子有憂色曰不也今擁楹而歎何也孟子對曰軻聞之君子稱身而就位不為茍得而受賞不貪榮祿諸侯不聽則不達其上聽而不用則不踐其朝今道不用於齊願行而母老是以憂也孟母曰夫婦人之禮精五飯幕音覔酒漿養舅姑縫衣裳而已矣故有閨內之修而無境外之志易曰在中饋無攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三從之道也故年少則從乎父母出嫁則從乎夫夫死則從於子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道詩云載色載笑匪怒伊教其此之謂也貞姬者楚白公勝之妻也白公死其妻紡績不嫁吳王聞其美且有行使大夫持金百鎰白璧一雙以聘焉以輜音緇軿音萍三十乘迎之將以為夫人大夫致幣白妻辭之曰白公生之時妾幸得充後宫執箕帚周上聲掌衣履拂枕席託為妃匹白公不幸而死妾願守其墳墓以終天年今王賜金璧之聘夫人之位非愚妾之所聞也且夫棄義從欲者汙也見利忘死者貪也夫貪汙之人王何以為哉妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉於死者亦然妾既不仁不能從死今又去而嫁不亦太甚乎遂辭聘而不行吳王賢其守節有義號曰貞姬楚君子謂貞姬亷潔而誠信夫任重而道遠仁以為已任不亦重乎死而後已不亦遠乎詩云彼美孟姜德音不忘此之謂也召南申女者申人之女也既許嫁於酆夫家禮不備而欲迎之女與其人言以為夫婦者人倫之始也不可不正傳曰正其本則萬物理失之毫釐差之千里是以本立而道生源治而流清故嫁娶者所以傳重承業繼續先祖為宗廟主也夫家輕禮違制不可以行遂不肯往夫家訟之於理致之於獄女終以一物不具一禮不備守節持義必死不往而作詩曰雖速我獄室家不足言夫家之禮不備足也君子以為得婦道之儀故舉而揚之傳而法之以絶無禮之求防淫欲之行焉又曰雖速我訟亦不汝從此之謂也魏芒慈母者魏孟陽氏之女芒卯之後妻也有三子前妻之子有五人皆不愛慈母遇之甚異猶不愛慈母乃令其三子不得與前妻子齊衣服飲食起居進退甚相遠前妻之子猶不愛於是前妻中子犯魏王令當死慈母憂戚悲哀帶圍减尺朝夕勤勞以救其罪人有謂慈母曰人不愛母至甚也何為勤勞憂懼如此慈母曰如妾親子雖不愛妾猶救其禍而除其害獨於假子而不為何以異於凡母其父為其孤也而使妾為其繼母繼母如母為人母而不能愛其子可謂慈乎親其親而偏其假可謂義乎不慈且無義何以立於世彼雖不愛妾安可以忘義乎遂訟之魏安釐音熙王聞之髙其義曰慈母如此可不救其子乎乃赦其子復其家自此五子親附慈母雍雍若一慈母以禮義之漸率導八子咸為魏大夫卿士各成於禮義君子謂慈母一心詩云尸鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮言心之均一也尸鳩以一心養七子君子以一儀養萬物一心可以事百君百心不可以事一君此之謂也前漢孝婦者陳之少寡婦也年十六而嫁未有子其夫當行戍音𣗳夫且行時屬孝婦曰我生死未可知幸有老母無他兄弟備養吾不還汝肯養吾母乎婦應曰諾夫果死不還婦養姑不衰慈愛愈固紡績以為家業終無嫁意居喪三年其父母哀其年少無子而早寡也將取而嫁之孝婦曰妾聞之信者人之幹也義者行之節也妾幸得離襁姜上聲褓音保受嚴命而事夫夫且行時屬妾以其老母既許諾之夫受人之託豈可棄哉棄託不信背死不義不可也母曰吾憐汝少年早寡也孝婦曰妾聞寧載於義而死不載於地而生且夫養人老母而不能卒許人以諾而不能信將何以立於世夫為人婦固養其舅姑者也夫不幸先死不得盡為人子之禮今又使妾去之莫養老母是明夫之不肖而著妾之不孝不孝不信且無義何以生哉因欲自殺其父母懼而不敢嫁也遂使養其姑二十八年姑死葬之終奉祭祀淮陽太守以聞漢孝文皇帝髙其義貴其信美其行使使者賜之黃金四十斤復之終身號曰孝婦君子謂孝婦備於婦道詩云匪直也人秉心塞淵此之謂也友娣者郃音合陽邑任延壽之妻也字季兒有三子季兒兄季宗與延壽爭葬父事延壽與其友田建隂殺季宗建獨坐死延壽㑹赦乃以告季兒季兒曰嘻獨今乃語我乎遂振衣欲去問曰所與共殺兄者為誰延壽曰田建田建已死獨我當坐之汝殺我而已季兒曰殺夫不義事兄之讎亦不義延壽曰吾不敢留汝願以車馬及家中財物盡以送汝聽汝所之季兒曰吾當安之兄死而讎不報與子同枕席而使殺吾兄內不能和夫家又縱兄之仇何面目以生而戴天履地乎延壽慙而去不敢見季兒季兒乃告其大女曰汝父殺吾兄義不可以留又終不復嫁矣吾去汝而死善視汝兩弟遂以繦自經而死馮翊王讓聞之大其義令縣復其三子而表其墓君子謂友娣善復兄仇詩曰不僣不賊鮮不為則季兒可以為則矣京師節女者長安大昌里人之妻也其夫有仇人欲報其夫而無道徑聞其妻之仁孝有義乃劫其妻之父使要其女為中譎音决父呼其女告之女計念不聽之則殺父不孝聽之則殺夫不義不孝不義雖生不可以行於世欲以身當之乃且許諾曰旦日在樓上新沐東首卧則是矣妾請開户牖待之還其家乃告其夫使卧他所因自沐居樓上東首開户牖而卧夜半仇家果至斷頭持去明而視之乃其妻之頭也仇人哀痛之以為有義遂釋不殺其夫君子謂節女仁孝厚於恩義也夫重仁義輕死亡行之髙者也論語曰君子殺身以成仁無求生以害仁此之謂也髙行者梁之寡婦也其為人榮於色而美於行夫死早寡不嫁梁貴人多爭欲娶之者不能得梁王聞之使相聘焉髙行曰妾夫不幸早死先狗馬填溝壑妾守養其幼孤曽不得意貴人多求妾者幸而得免今王又重之妾聞婦人之義一往而不改以全貞信之節念忘死而趨生是不信也貴而忘賤是不貞也棄義而從利無以為人乃援鏡持刀以割其鼻曰妾已刑矣所以不死者不忍幼弱之重孤也王之求妾者以其色也今刑餘之人殆可釋矣於是相以報王大其義髙其行乃復其身尊其號曰髙行君子謂髙行節禮專精詩云謂豫不信有如皎日此之謂也後漢梁鴻妻者右扶風梁伯鸞之妻同郡孟氏之女其姿貌甚醜而德行甚修鄉里多求者而女輒不肯行年三十父母問其所欲對曰欲節操如梁鴻者時鴻未娶扶風世家多願妻者亦不許聞孟氏女言遂求納之孟氏盛飾入門七日而禮不成妻跪問曰竊聞夫子髙義斥數妻妾亦已偃蹇堅上聲數夫今來而見擇請問其故鴻曰吾欲得衣裘褐之人與共遁世避時今若衣綺繡傅黛音代墨非鴻所願也妻曰竊恐夫子不堪妾幸有隱居之具矣乃更粗衣椎髻而前鴻喜曰如此者誠鴻妻也字之曰德曜名孟光自名曰運期字俟光共遁逃霸陵山中此時王莽新敗之後也鴻與妻深隱耕耘織作以供衣食誦書彈琴忘富貴之樂後復相將至㑹稽賃舂為事雖雜庸保之中妻每進食舉案齊眉不敢正視以禮修身所在敬而慕之君子謂梁鴻妻好道安貧不汲汲於榮樂論語曰不義而富且貴於我如浮雲此之謂也扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學髙才世叔早卒有節行法度兄固著漢書其八表及天文志未及竟而卒和帝詔昭踵中上聲而成之數召入宫令皇后諸貴人師事焉號曰大家永初中太后兄大將軍鄧隲以母憂上書乞身太后不欲許以問昭昭因上疏曰伏惟皇太后陛下躬盛德之美隆唐虞之政闢四門而開四聰采狂夫之瞽音古言納芻音初蕘之謀慮妾昭得以愚朽身當盛明敢不披露肝膽以效萬一妾聞謙讓之風德莫大焉故典墳述美神祗降福昔夷齊去國天下服其亷髙太伯違邠孔子稱為三讓所以光昭令德揚名于後者也論語曰能以禮讓為國於從政乎何有由是言之推讓之誠其致遠矣今四舅深執忠孝引身自退而以方埀未靜拒而不許如後有毫毛加於今日誠恐推讓之名不可再得緣見逮及故敢昧死竭其愚情自知言不足采以示蟲蟻音擬之赤心太后從而許之於是隲等各還里第焉作女誡七篇有助內訓年七十餘卒皇太后素服舉哀使者監護喪事所著賦頌銘誄音壘問注哀辭書論上疏遺令凡十六篇子婦丁氏為撰集之乂作大家譛焉太原王霸妻者不知何氏之女也霸少立髙節光武時連徴不仕妻亦美志行初霸與同郡令狐子伯為友後子伯為楚相而其子為郡功曹子伯乃令子奉書於霸車馬服從雍容如也霸子時方耕於野聞賓至投耒音纇而歸見令狐子沮怍音昨不能仰視霸目之有愧容客去而久卧不起妻怪問其故始不肯告妻請罪而後言曰吾與子伯素不相若向見其子容服甚光舉措有適而我兒曹蓬髮厯齒未知禮則見客而有慙色父子恩深不覺自失耳妻曰君少修清節不顧榮祿今子伯之貴孰與君之高奈何忘宿志而慙兒女子乎霸屈起而笑曰有是哉遂共終身隱遁豚去聲河南樂羊子之妻者不知何氏之女也羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水亷者不受嗟來之食况拾遺求利以汙其行乎羊子大慙乃捐金於野而遠尋師學一年來歸妻跪問其故羊子曰久行懷思無他異也妻乃引刀趨機而言曰此織生自蠶繭成於機杼音佇一絲而纍以至於寸纍寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時月夫子積學當日知其所亡以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返妻常躬勤養姑又遠饋音匱羊子嘗有他舍雞謬入園中姑盜殺而食之妻對雞不餐而泣姑怪問其故妻曰自傷居貧使食有他肉姑竟棄之後盜有欲犯妻者乃先劫其姑妻聞操刀而出盜人曰釋汝刀從我者可全不從我者則殺汝姑妻仰天而歎舉刀刎頸而死盜亦不殺其姑太守聞之即捕殺賊盜而賜妻縑帛以禮葬之號曰貞義鮑宣妻桓氏字少君宣嘗就少君父學父竒其清苦故以女妻之裝送資賄甚盛宣不悅謂妻曰少君生富驕習美飾而吾實貧賤不敢當禮妻曰大人以先生修德守約故使妾侍執巾櫛既奉承君子唯命是從宣笑曰能如是是吾志也妻乃悉歸侍御服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之吳許升妻者吕氏之女也字榮升少為博徒不理操行榮嘗躬勤家業以奉養其姑數勸升修學每有不善輒流悌進規榮父積忿疾升乃呼榮欲改嫁之榮歎曰命之所遭義無離二終不肯歸升感激自勵乃尋師遠學遂以成名尋被本州辟命行至壽春道為盜所殺刺史尹耀捕盜得之榮迎喪於路聞而詣州請甘心讎人耀聽之榮乃手斷其頭以祭升靈後郡遭冦賊賊欲犯之榮踰垣走賊拔刀追之賊曰從我則生不從我則死榮曰義不以身受辱冦虜也遂殺之是日疾風暴雨雷電晦冥賊惶懼叩頭謝罪乃殯葬之酒泉龎涓母者趙氏之女也字娥父為同縣人所殺而娥兄弟三人時俱病物故讎乃喜而自賀以為莫已報也娥隂懷感憤乃潛備刀兵常帷車以候讎家十餘年不能得後遇於都亭刺殺之因詣縣自首曰父仇已報請就刑戮音六福祿長尹嘉義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪理獄君之常理何敢茍生以枉公法後遇赦得免州郡表其閭太常張奐音喚嘉歎以束帛禮之沛劉長卿妻者同郡桓鸞之女也生一男五嵗而長卿卒妻防遠嫌疑不肯歸寧兒年十五晚又夭歿妻慮不免乃豫刑其耳以自誓宗婦相與愍之共謂曰若家殊無他意假令有之猶可因姑姊妹以表其誠何貴義輕身之甚哉對曰昔我先君五更學為儒宗尊為帝師五更以來歷代不替男以忠孝顯女以貞順稱詩云無念爾祖聿修厥德是以豫自刑剪以明我情沛相王吉上奏髙行顯其門閭號曰行義桓嫠縣邑有祀必膰音煩焉南陽隂瑜音俞妻者潁川荀爽霜上聲之女也名采字女荀聰敏有才藝年十七適隂氏十九産一女而瑜卒采時尚豐少常慮為家所逼自防禦甚固後同郡郭奕喪妻爽以采許之因詐稱病篤召采既不得已而歸懷刃自誓爽令傅婢執奪其刃扶抱載之猶憂致憤激敕衛甚嚴女既到郭氏乃僞為歡悅之色謂左右曰我本立志與隂氏同穴而不免逼迫遂至於此素情不遂奈何乃使建四燈盛裝飾請奕入相見共談言辭不輟奕敬憚之遂不敢逼至曙而出采因勑令左右辦浴既入室而掩户權令侍人避之以粉書扉上曰尸還隂隂字未及成懼有來者遂以衣帶自縊左右玩之不為意比視氣已絶時人傷焉元魏巨鹿魏溥音普妻房氏者慕容埀貴鄉太守常山房湛女也幼有烈操年十六而溥遇疾且卒顧謂之曰死不足恨但痛母老家貧赤子䝉眇抱怨於黃壚耳房埀泣而對曰幸承先人餘訓出事君子義在偕老有志不從蓋其命也今夫人在堂弱子襁褓顧當以身少相感永深長往之恨俄而溥卒及將大斂房氏操刀割左耳投之棺中仍曰鬼神有知相期泉壤流血滂然助喪者哀懼姑劉氏輟哭而謂曰新婦何至於此對曰新婦少年不幸早寡實慮父母未量至情覬音冀持此自誓耳聞知者莫不感愴於時子緝生未十旬鞠育於後房之內未嘗出門遂終身不聽絲竹不預座席緝年十二房父母仍存於是歸寧父兄尚有異議緝竊聞之以啓其母房命駕紿云他行因而遂歸其家弗之知也行數十里方覺兄弟來追房哀歎而不反其執意如此訓導一子有母儀法度緝所交游有名勝者則身具酒饌有不及已者輒屏卧不飱須其悔謝乃食善誘嚴訓類皆如是年六十五而終緝子悅後為濟隂太守吏民立碑頌德金紫光祿大夫髙閭為其文曰爰及處士遘疾夙凋伉儷秉志識茂行髙殘形顯操誓敦久要溥未仕而卒故云處士焉清河房愛親妻崔氏者同郡崔元孫之女也性嚴明有髙節歷覽書傳多所聞知親授子景伯景光九經義學行修明並當世名士景伯為清河太守每有疑獄常先請焉貝丘人列子不孝吏欲案之景伯為之悲傷入白其母母曰聞名不如見面小人未見禮教何足責哉但呼其母來吾與之同居其子置左右令見汝事吾或應自改景伯遂召其母崔氏處之於榻與之共食景伯為之溫凊其子侍立堂下未及旬日悔過求還崔氏曰此雖顔慙未知心愧且可置之凡經二十餘日其子叩頭流血其母涕泣乞還然後聽之終以孝聞其識度勵物如此後竟以壽終涇州貞女兒氏者許嫁彭老生為妻聘幣既畢未及成禮兒氏率行貞淑居貧常自舂汲以養父母老生輒往逼之女曰與君聘命雖畢二門多故未及相見何由不稟父母擅見陵辱若茍行非禮正可身死耳遂不肯從老生怒而刺殺之取其衣服女尚能言臨死謂老生曰生身何罪與君相遇我所以執節自固者寧更有所邀正欲奉給君耳今反為君所殺若魂靈有知自當相報言終而絶老生持女衣服珠纓至其叔宅以告叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾以死罪詔曰老生不仁侵陵貞淑原其强暴便可戮之而女守禮履節沒身不改雖處草莽行合古跡宜賜美名以顯風操其標墓旌善號曰貞女隋孝女王舜者趙郡人也父子春與從兄長欣不協齊亡之際長欣與其妻同謀殺子春舜時年七嵗有二妹粲年五嵗璠年二嵗並孤苦寄食親戚舜撫育二妹恩義甚篤而舜隂有復讎之心長欣殊不為備妹俱長親戚欲嫁之輒拒不從乃密謂二妹曰我無兄弟致使父讎不復吾輩雖女子何用生為我欲共汝報復汝意何如二妹皆埀泣曰唯姊所命夜中姊妹各持刀踰牆入手殺長欣夫婦以告父墓因詣縣請罪姊妹爭為謀首州縣不能决文帝聞而嘉歎特原其罪孝婦覃氏者上郡鍾氏婦也與夫相見未幾而夫死時年十八事姑以孝聞數年間姑及伯叔皆相繼死覃氏家貧無以葬躬自節儉晝夜紡績十年而葬八喪為州里所敬文帝聞而賜米百石表其門閭趙元楷妻崔氏者清河人也甚有禮度隋末宇文化及之反元楷隨至河北將歸長安至滏口遇盜僅以身免崔氏為賊所拘請以為妻崔氏曰我士大夫女為僕射子妻今日破亡自可即死終不為賊婦羣賊毁裂其衣縛於牀簀上將陵之崔氏懼為所辱詐之曰今力已屈當受處分賊遂釋之妻因取賊刀倚樹而立曰欲殺我任加刀鋸若覔死可來相逼賊大怒亂射殺之元楷後得殺妻者支解以祭崔氏之柩唐樊㑹仁母敬氏字像子蒲州河東人也年十五適樊氏生㑹仁而夫喪事舅姑娣姒以謹順聞及服終母兄以其盛年將奪其志微加諷諭便悲恨嗚咽如此者數四母兄乃潛許人為婚矯稱母患以召之凡所營具皆寄之鄰里像子既至省母無疾鄰家復具肴膳像子知為所欺佯為不悟者其嫂復請像子沐浴像子私謂㑹仁曰吾不幸孀居誓與汝父同穴所以不死者徒以我母羸老汝身幼弱今汝舅欲奪吾志將加逼迫於汝何如㑹仁失聲啼泣像子撫之曰汝勿啼吾向僞不覺者令汝舅不我為意聞汝啼知吾覺悟必加防備則吾難為計矣㑹仁便佯睡像子於是伺隙携之遁歸中路兄使追及之將逼與俱返像子誓以必死辭情甚切其兄感歎而止後㑹仁年十八病卒時像子母已終既葬像子謂其所親曰吾老母不幸又夫死子亡義無久活於是號慟不食數日而死樊彥琛妻魏氏楚州淮隂人彥琛病篤將卒魏泣而言曰幸以愚陋託身明德奉侍衣裳二十餘載豈意釁妨所招遽見此禍同入黃泉是其願也彥琛答曰死生常道無所多恨君宜勉勵養諸孤使其成立若相從而死適足貽纍非吾所取也彥琛卒後屬李敬業之亂乃為賊所獲賊黨知其素解絲竹逼令彈箏魏氏歎曰我夫不幸亡歿未能自盡茍復偷生今復見逼管絃豈非禍從手發耶乃引刀斬指棄之於地賊黨又欲妻之魏以必死自固賊等忿怒以刃加頸語云若不從我即當殞命乃厲聲罵曰爾等狗盜乃欲汙辱好人今得速死㑹我本志賊乃斬之聞者莫不傷惜奉大竇氏二女生長草野幼有志操永泰中羣盜數千人剽掠其村落二女皆有容色長者年十九幼者年十六匿岩穴間曵出之驅迫以前臨壑谷深數百尺其姊先曰吾寧就死義不受辱即投崖下而死盜方驚駭其妹繼之自投折足破面流血羣盜乃舍之而去京兆尹第五琦嘉二女之貞烈奏之詔旌表其門閭永蠲其家丁役宋朱娥者越州上虞朱回女也母蚤亡養于祖媪音襖娥十嵗里中朱顔與媪競持刀欲殺媪一家驚潰獨娥號呼突前擁蔽其媪手挽顔衣以身下墜顔刀曰寧殺我無殺媪也媪以娥故得脫娥連被數十刀猶手挽顔衣不釋顔忿恚斷其喉以死事聞賜其家粟帛其後㑹稽令為娥立像于曹娥廟嵗時配享焉張氏羅江士人女其母楊氏寡居一日親黨有婚㑹母女偕往其典庫雍乙者從行既就坐乙先歸會罷楊氏歸則乙死於庫莫知殺者主名提㸃成都府路刑獄張文饒疑楊有私懼為人知殺乙以滅口遂命石泉軍劾治楊言與女同榻實無他遂逮其女考掠無實吏乃掘地為坑縛母子于其內旁列熾火間以水沃之絶而復蘇者屢辭終不服一日謂獄吏曰我不勝苦毒將死矣願一見母而絶吏憐而許之既見謂母曰母以清潔聞奈何受此汙辱寧死箠追上聲楚不可自誣女今死死將訴寃於天言終而絶於是石泉連三日地大震有聲如雷天雨雪屋瓦皆落邦人震恐勘官李志寧疑其獄夕具衣冠禱于天俄假寐坐㕔事恍有猿墜前驚悟呼吏卒索之不見志寧自念夢兆非殺人者袁姓乎有門卒忽言張氏饋食者曰袁大明日袁至使吏執之曰殺人者汝也袁色動遽曰吾憐之久矣願就死問之云適盜庫金㑹雍歸遂殺之楊乃得免時女死才數日也獄上郡榜其所居曰孝感坊趙氏具州人父嘗舉學究王則反聞趙氏有殊色使人劫致之欲納為妻趙日號哭慢罵求死賊愛其色不殺多使人守之趙知不脫乃紿曰必欲妻我宜擇日以禮聘賊從之使歸其家家人懼其自殞得禍于賊益使人守視賊具聘幣盛輿從來迎趙與家人訣曰吾不復歸此矣問其故答曰豈有為賊汙辱至此而尚有生理乎家人曰汝忍不為家族計趙曰第無患遂涕泣登輿而去至州廨音戒舉簾視之已自縊移去聲輿中死矣尚書屯田員外郎張寅有趙女詩徐氏和州閎中女也適同郡張弼建炎三年春金人侵維揚官軍望風奔潰多肆淫掠執徐欲汙之徐瞋音嗔目大罵曰朝廷蓄汝輩以備緩急今敵抵行在既不能赴難又乘時為盜我恨一女子不能引劒斷汝頭以快衆憤肯為汝辱以茍活耶第速殺我賊恚以刃刺殺之投江中而去王貞婦夫家臨海人也德祐二年冬元兵入浙東婦與其舅姑夫皆被執既而舅姑與夫皆死主將見婦晳音析美欲內音納之婦號慟欲自殺為奪挽不得死夜令俘囚婦人雜守之婦乃陽謂主將曰若以吾為妻妾者欲令終身善事主君也吾舅姑與夫死而我不為之衰是不天也不天之人若將焉用之願請為服期即惟命茍不聽我我終死耳不能為若妻也主將恐其誠死許之然防守益嚴明年春師還挈行至嵊乘去聲青楓嶺下臨絶壑婦待守者少懈囓指出血書字山石上南望慟哭自投崖下而死後其血皆漬入石間盡化為石天且隂雨即墳起如始書時元至治中旌為貞婦郡守立石祠嶺上易名曰清風嶺談氏婦趙吉州永新人元至元十四年江南既內附永新復嬰城自守元兵破城趙氏抱嬰兒隨其舅姑同匿鄉校中為悍音旱卒所獲殺其舅姑執趙欲汙之不可臨之以刃曰從我則生不從則死趙罵曰吾舅死於汝吾姑又死於汝吾與其不義而生寧從吾舅姑以死耳遂與嬰兒同遇害血漬於禮殿兩楹之間八甎音專為婦人與嬰兒狀久而宛然如新或訝之磨以沙石不滅又鍛音段以熾炭其狀益顯韓氏女字希孟巴陵人或曰丞相琦音竒之裔少明慧知讀書開慶元年元兵至嶽陽女年十有八為卒所掠將挾以獻其主將女知必不免竟赴水死越三日得其尸於練裙帶有詩曰我質本瑚璉宗廟供蘋蘩一朝嬰禍難失身戎馬間寧當血刃死不作衽席完漢上有王猛江南無謝安長號赴洪流激烈摧心肝陳堂前漢州雒縣王氏女節操行義為鄉人所敬但呼曰堂前猶私家尊其母也堂前年十八歸同郡陳安節嵗餘夫卒僅有一子舅姑無生事堂前斂泣告曰人之有子在奉親克家爾今已無可奈何婦願幹蠱音古如子在日舅姑曰若然吾子不亡矣既葬其夫事親治家有法舅姑安之子日新年稍長延名儒訓導既冠入太學年三十卒二孫曰綱曰紱音弗咸篤學有聞初堂前歸陳夫之妹尚幼堂前教育之及笄以厚禮嫁遣舅姑亡妹求分財産堂前盡遺室中所有無靳斤去聲色不五年妹所得財為夫所罄乃歸悔堂前為買田治屋撫育諸甥無異已子親屬有貧窶不能自存者收養婚嫁至三四十人自後宗族無慮百數里有故家甘氏貧而質其季女於酒家堂前出金贖之俾有所歸子孫遵其遺訓五世同居並以孝友儒業著聞乾道九年詔旌表其門閭云王氏利州路提舉常平司幹辦公事劉當可之母也紹定三年就養興元元兵破蜀提刑龎援檄當可詣行司議事當可捧檄白母王氏毅然勉之曰汝食君祿豈可辭難當可行元軍屠興元王氏義不辱大罵投江而死其婦杜氏及婢僕五人咸及于難當可聞變奔赴江滸音虎得母喪以歸詔贈和義郡太夫人詹氏女蕪湖人紹興初年十七淮冦號一窠蜂倐破縣女歎曰父子無俱生理我計决矣頃之賊至欲殺其父兄女趨而前拜曰妾雖窶陋願執巾帚以事將軍贖父兄命不然父子併命無益也賊釋父兄縛女麾手使亟去無相念我得侍將軍何所憾哉遂隨賊行數里過市東橋躍身入水死賊相顧駭歎而去王氏婦梁臨川人歸夫家才數月㑹元兵至一夕與夫約曰吾遇兵必死義不受汙辱若後娶當告我頃之夫婦被掠有軍千户强使從已婦紿曰夫在伉儷之情有所不忍乞歸之而後可千户以所得金帛與其夫而歸之并與一矢以却後兵約行十餘里千户即之婦拒且罵曰斫頭奴吾與夫誓天地鬼神實臨之此身寧死不可得也因奮搏之乃被殺有同掠脫歸者道其事越數年夫以無嗣謀更娶議輒不諧因告其故妻夜夢妻曰我死後生某氏家今十嵗矣後七年當復為君婦明日遣人聘之一言而合詢其生與婦死年月日同云元趙孝婦德安應城人早寡事姑孝家貧傭織於人得美食必持歸奉姑自啖粗糲䦨入聲不厭嘗念姑老一旦有不諱無由得棺乃以次子鬻音育富家得錢百緡買杉木治之棺成置于家南鄰失火時南風烈甚火勢及孝婦家孝婦亟扶姑出避而棺重不可移乃撫膺大哭曰吾為姑賣兒得棺無能為我救之者苦莫大焉言畢風轉而北孝婦家得不焚人以為孝感所致聞氏紹興俞新之妻也大德四年新之歿聞氏年尚少父母慮其不能守欲更嫁之聞氏曰一身二夫烈婦所恥妾可無生可無恥乎且姑老子幼妾去當令誰視也即斷髮自誓父知其志篤乃不忍强姑久病風且失明聞氏手滌溷渾去聲穢不怠時潄口上堂䑛音始其目目為復明及姑卒家貧無資傭工與子親負土葬之朝夕悲號聞者慘惻鄉里嘉其孝為之語曰欲學孝婦當問俞母李智貞建寧浦城人父子明無子智貞七嵗能讀書九嵗母病調護甚謹及卒哀慟欲絶不茹葷三年治女工供祭祀及奉父甘㫖不乏鄉里稱為孝女父嘗許為鄭全妻未嫁從父客邵武邵武豪陳良悅其慧强納采求聘智貞斷髮拒之且數自求死良不能奪卒歸全事舅姑父母皆有道泰定間全病歿智貞悲泣不食數日而死李景文妻徐氏名彩鸞字淑和浦城徐嗣源之女略通經史每誦文天祥六歌必為之感泣至正十五年青田賊冦浦城徐氏從嗣源逃旁近山谷賊持刀欲害嗣源徐氏前曰此吾父也寧殺我賊舍父而止徐氏徐氏語父曰兒義不受辱今必死父可速去賊拘徐氏至桂林橋拾炭題詩壁間有惟有桂林橋下水千年照見妾心清之句乃厲聲罵賊投于水賊競出之既而乘間復投水死趙彬妻朱氏名錦哥洛陽人也天厯初西兵掠河南朱氏遇兵五人被執逼與亂朱氏拒曰我良家婦豈從汝賊耶兵怒提曳箠楚之朱氏度不能脫即紿謂之曰汝幸釋我舍後井傍有瘞金當發以遺汝兵信之乃隨其行朱氏得近井即抱三嵗女踴身赴井中死節婦張氏濟南鄒平縣人年十八為里人李五妻居無何夫戍福建之福寧州死於戍時舅姑父母俱老家貧張自度不能歸其夫之喪益自勤苦蠶繅紡績以為養舅姑父母病凡四刲股救不懈暨死喪葬盡禮既而嘆曰夫死數千里外不能歸骨以葬者以舅姑父母無所仰故也今不幸舅姑父母皆死而夫之骨終暴棄遠土妾何以生為乃卧積氷上誓曰使妾卒能歸夫之骨以葬即幸不凍死卧月餘不死鄉人異之乃相率贈以錢張大書其事于衣以行由鄒平至福寧凡五千餘里不四十日而至得見其猶子問夫所葬處則已忘之矣張乃哀號欲絶忽其夫降于童道别及死哀苦狀且指示骨所在張如其言求之果得骨以歸有司上其事至治元年夏四月遂旌表其門復其身俞士淵妻童氏嚴州人姑性嚴待之寡恩童氏柔順以事之無少拂其意者至正十三年賊陷威平官軍復之已乃縱兵剽掠至士淵家童氏以身蔽姑衆欲汙之童氏大罵不屈一卒以刀擊其左臂愈不屈又一卒斷其右臂罵猶不絶衆乃皮其面而去明日乃死惠士𤣥妻王氏大都人至正十四年士𤣥病革王氏曰吾聞病者糞苦則愈乃嘗其糞頗甘王氏色愈憂士𤣥屬王氏曰我病必不起前妾所生子汝善保護之待此子稍長即從汝自嫁矣王氏泣曰君何為出此言耶設有不諱妾義當死尚復有他說乎君幸有兄嫂此兒必不失所居數日士𤣥卒比葬王氏遂居墓側蓬首垢面哀毁逾禮常以妾子置左右飲食寒暖惟恐不至嵗餘妾子亦死乃哭曰無復望矣屢引刀自殺家人驚救得免至終喪親舊皆携酒禮祭士𤣥于墓祭畢衆欲行酒王氏已經死於樹矣國朝欒城李大妻甄氏孝於舅姑夫與其弟異居姑一日出往次子家甄氏隨侍不忍去姑命之還甫三日甄氏忽心動舉身流汗少頃果有來告其姑病篤者甄氏沿道拜禱往至姑側侍疾數日而愈後姑年九十一以疾卒合葬于舅墓甄氏廬于墓側三年旦夕悲慟不輟里人稱為孝婦洪武中詔旌表其門寧氏女初許嫁安丘劉真兒未嫁而真兒死寧氏年十六聞訃哭甚哀既而謂父母曰古云烈女不更二夫吾身雖未與之醮然媒妁聘幣父母之命皆已定矣今其不幸而死其父母老無所依吾豈忍背之操他人家箕帚耶遂請往夫家侍養舅姑父母初未之許寧氏請益堅卒許之寧氏至其家哭臨葬祭無違禮執婦道甚恭織紝以供甘㫖如是者凡五十二年年六十八鄉里稱焉事聞詔旌表其門曰貞節延安張敏道妻趙氏年二十一敏道疾將終趙氏對夫自誓及夫歿日夜號慟自經死詔旌其門曰貞烈上海任仕中妻俞氏字淑安年二十一而寡女甫二嵗一男生五月姑先夫卒舅仕遠方家貧無依親戚咸勸之再適俞氏斷髮自誓復强之俞氏欲自剄音頸衆懼而止紡織績紝教子女至于長女適俞邦用邦用亦早卒所親憐其貧勸之再適女曰我再嫁俞氏祭祀誰奉之且辱吾母寧餓死不改節乃歸與母同居守志有司上其事詔旌所居曰雙節之門李忠妻王氏安慶懷寧人忠溺死王氏求尸得之號慟欲絶移時始蘇既斂又欲赴水死姑救免還家日夜號慟絶不飲食數日自經死步善慶為陳氏贅壻未幾病卒其妻哀痛三年如一日服除拜其父母兄嫂曰吾夫家無可依乞養我以終身其父曰汝年少當為汝求配婦不答即自經死山隂徐允讓與妻潘氏元至正己亥春從父安避兵山谷間遇官兵至斫安頸流血允讓大呼曰汝寧殺我勿殺吾父兵即捨安而殺允讓將辱潘潘紿曰我夫既死從汝必矣若能焚吾夫則從汝無憾也兵信之聽潘聚薪焚其夫因自投烈熖而死國初事上聞禮部議曰允讓能捐軀以全父生潘氏能隕命以全婦道孝節並著實人所難詔旌表為孝節之門安吉李茂死妻髙氏買棺葬之自經於墓側真定髙邑許顒二妾陳氏牛氏顒卒皆自經死事聞詔旌為雙節之門光州固始髙氏有五節婦劉氏髙希鳯妻也希鳯在遼東為亂軍所掠拒而不伏軍怒斷其腕而死劉氏亦被虜行十餘里罵不絶口為所殺希鳯仲弟藥師努妻李氏早寡因亂携子姪往避難髙麗國初同子姪來歸居應天府守夫墓誓不再適希鳯季弟巴延布哈為納克楚所殺其妻郭氏自縊於馬櫪音厯希鳯從子髙達實丹為父讎誣陷而死其妻金氏與姑邢氏俱自縊于室一門義不受辱詔旌表之真定深州傅某妻嶽氏年十八無子其夫病革呼嶽屬曰爾年少善事後夫嶽涕泣曰吾豈忍事他人寧俱死不獨生及夫卒嶽憑尸號哭遂自經死有司以聞旌其門曰貞烈饒州樂平縣徐德安妻陳氏年甫二十其夫疾革謂曰汝無子吾死汝他適陳泣曰既為君婦豈事二姓乎即割一耳及剪髮示之夫死納棺中終身不改事聞詔旌表之古今列女傳卷三
