body:
  text: 古今列女傳卷一明解縉等撰虞有虞舜氏二妃者帝堯之二女也長娥皇次女英舜父頑母嚚父號瞽音古叟弟曰象敖遊於嫚慢同舜能諧柔之承事瞽叟以孝母憎舜而愛象舜猶內治靡有姦意四嶽薦之於堯堯乃妻以二女以觀厥內二女承事舜於畎畝之中不以天子之女故而驕盈怠嫚猶謙謙恭儉思盡婦道瞽叟與象謀殺舜使塗廩音凜舜歸告二女曰父母使我塗廪我其往二女曰往哉舜既治廪乃捐音㳙階梯也瞽叟焚廪舜以兩笠自扞音汗而下復使舜浚詢去聲井舜乃告二女二女曰俞往哉舜往浚井格其出入從掩舜從匿空去聲傍出時既不能殺舜瞽叟又速舜飲酒醉將殺之舜告二女二女乃與藥浴汪汪池也遂往舜終日飲酒不醉舜之女弟繫憐之與二嫂諧父母欲殺舜舜猶不怨怒之不已舜往于田號泣日呼旻音民天呼父母惟害若兹思慕不已不怨其弟篤厚不怠既納于百揆賓于四門選于林木入于大麓音鹿堯試之百方每事常謀於二女舜既嗣位升為天子娥皇為后女英為妃封象于有庳音鼻地名事瞽叟猶若焉天下稱二妃聰明貞仁舜陟音職方死於蒼梧地名號曰重華二妃死於江湘之間俗謂之湘君君子曰二妃德純而行篤詩云不顯惟德百辟音璧其刑之此之謂也夏啓母者塗山氏長女也夏禹娶以為妃既生啓辛壬癸甲啓􅈱􅈱音孤泣禹去而治水惟荒度土功三過其家不入其門塗山獨明教訓而致其化焉及啓長化其德而從其教卒致令名禹為天子而啓為嗣持禹之功而不殞云上聲君子謂塗山彊於教誨詩云釐音離爾士女從以孫子此之謂也商契音屑母簡狄者有娀音嵩氏之長女也當堯之時與其妹娣浴於𤣥丘之水有𤣥鳥銜卵過而墜之五色甚好簡狄與其妹娣競往取之簡狄得而含之誤而吞之遂生契焉簡狄性好人事之治上知天文樂於施惠及契長而教之理順之序契之性聰明而仁能育其教卒致其名堯使為司徒封之於亳音薄及堯崩舜即位乃勑之曰契百姓不親五品不遜汝作司徒而敬敷五教在寬其後世世居亳至殷湯興為天子君子謂簡狄仁而有禮詩云有娀方將帝立子生商又曰天命𤣥鳥降而生商此之謂也湯妃有㜪莘同者有㜪氏之女也殷湯娶以為妃生仲壬外丙亦明教訓致其功有㜪之妃湯也統領九嬪音頻後宫有序咸無妬都去聲媢音冒逆理之人卒致王功君子謂妃明而有序詩云窈音杳窕條上聲淑女君子好逑言賢女能為君子和好衆妾其有㜪之謂也周棄母姜嫄音原者邰音台侯之女也當堯之時行見巨人跡好而履之歸而有娠音身浸以益大心怪惡之卜筮禋音因祀以求無子終生子以為不祥而棄之隘崖去聲巷牛羊避而不踐乃送之平林之中後伐平林者咸薦之覆之乃取置寒氷之上飛鳥傴區上聲翼之姜嫄以為異乃收以歸因命曰棄姜嫄之性清靜專一好種稼穡及棄長而教之種樹桑麻棄之性明而仁能育其教卒致其名堯使棄居稷官更國邰地遂封棄於邰號曰后稷及堯崩舜即位乃命之曰棄黎民阻飢汝后稷播時百榖其後世世居稷至周文武而興為天子君子謂姜嫄靜而有化詩云赫赫姜嫄其德不回上帝是依又曰思文后稷克配彼天立我蒸民此之謂也太姜者王季之母有吕氏之女太王取娶同以為妃生太伯仲雍王季貞順率道靡有過失太王謀事遷徙必與太姜君子謂太姜廣於德教詩云爰及姜女聿來胥宇此之謂也太任者文王之母摯音至任氏中女也王季娶為妃太任之性端一誠莊惟德之行及其有娠目不視惡色耳不聽淫聲口不出敖言生文王而明聖太任教之以一而識百君子謂太任為能胎教古者婦人妊子寢不側坐不邊立不蹕音必不食邪味割不正不食席不正不坐目不視于邪色耳不聽于淫聲夜則令瞽誦詩道正事如此則生子形容端正才德必過人矣故妊子之時必慎所感感於善則善感於惡則惡人生而肖音笑萬物者皆其母感於物故形音肖之文王母可謂知肖化矣太姒者武王之母禹後有莘姒氏之女仁而明道文王嘉之親迎于渭造舟為梁及入太姒思媚太姜太任旦夕勤勞以進婦道太姒號曰文母文王治外文母治內太姒生十男長伯邑考次武王發次周公旦次管叔鮮次蔡叔度次曹叔振鐸次霍叔武次成叔處次康叔封次聃音耽季載太姒教誨十子自少及長未嘗見邪僻之事及其長文王繼而教之卒成武王周公之德君子謂太姒仁明而有德詩曰大邦有子俔音峴天之妹文定厥祥親迎于渭造舟為梁不顯其光又曰太姒嗣徽音暉音則百斯男此之謂也周宣姜后者齊侯之女也賢而有德事非禮不言行非禮不動宣王常早卧晏起后夫人不出房姜后脫簪珥音耳待罪於永巷使其傅姆通言於王曰妾之不才至使君王失禮而晏朝以見君王樂色而忘德也夫茍樂色必好奢窮欲亂之所興也原亂之興從婢子起敢請婢子之罪王曰寡人不德實自生過非夫人之罪也遂復姜后而勤於政事早朝晏退卒成中興之名君子謂姜后善於威儀而有德行夫禮后夫人御於君以燭進至於君所滅燭適房中脫朝服衣䙝音泄服然後進御于君雞鳴樂師擊鼓以告旦后夫人鳴珮而去詩曰威儀抑抑德音秩秩又曰隰音習桑有阿其葉有幽既見君子德音孔膠音交夫婦人以色親以德固姜氏之德行可謂孔膠也前漢馮昭儀者孝元帝之昭儀右將軍光祿勳馮奉世之女也元帝二年昭儀以選入後宫始為長使數月為美人生男是為中山孝王美人為婕音接妤音餘建昭中上幸虎圈音勸畜間鬬獸後宫皆從熊音雄逸出圈攀檻欲上殿左右貴人傅昭儀皆驚走而馮婕妤直當熊而立左右格殺熊天子問婕妤人情皆驚懼何故當熊對曰妾聞猛獸得人而止妾恐至御坐故以身當之元帝嗟嘆以此敬重焉傅昭儀等皆慙明年中山王封乃立婕妤為昭儀隨王之國號中山太后君子謂昭儀勇而慕義詩云公之媚子從公于狩論語曰見義不為無勇也昭儀兼之矣班婕妤者左曹越騎班况之女漢孝成皇帝之婕妤也賢才通辨始選入後宫為小使俄而大幸為婕妤成帝遊於後庭嘗欲與婕妤同輦辭曰觀古圖畫賢聖之君皆有名臣在側三代之末主乃有女嬖今欲同輦得無似之乎上善其言而止太后聞而喜曰古有樊姬今有班婕妤每誦詩及窈窕德象女師之篇必三復之每進見上疏依古禮自鴻嘉之後成帝稍隆於女寵婕妤進侍者李平平得幸立為婕妤帝曰始衛皇后亦從微起乃賜平姓曰衛所謂衛婕妤也其後趙飛燕姊音子妹有寵驕妬譛訴班婕妤云挾邪詛租去聲祝周去聲上考問班婕妤曰妾聞死生有命富貴在天修正尚未䝉福為邪欲以何望且使鬼神有知不受不臣之訴如其無知訴之何益故弗為也上善其對而憐憫之賜黃金百斤時飛燕驕妬婕妤恐久見危求供養皇太后於長信宫上許焉婕妤退處東宫作賦自傷至成帝崩婕妤充奉園陵薨因葬園中君子謂班婕妤辭同輦之言蓋宣后之志也進李平於同列樊姬之德也釋詛祝之譛定姜之知也求供養於東宫寡李之行也及其作賦哀而不傷歸命不怨詩云有斐君子如切如磋如琢如磨瑟兮僩間上聲兮赫兮喧暄上聲兮有斐君子終不可諼萱同兮其班婕妤之謂也漢王皇后者安漢公太傅大司馬王莽之女孝平皇帝之后也為人婉淑有節行平帝即位后年九嵗莽秉政欲依霍光故事以女配帝后立嵗餘平帝崩後數年莽篡漢位后年十八自劉氏廢常稱疾不朝㑹莽敬憚哀傷意欲嫁之令立國將軍孫建世子豫將醫往問疾后大怒鞭笞旁侍御因廢疾不肯起莽遂不敢强也及漢兵誅莽燔燒未央后曰何面目以見漢家自投火中而死君子謂平后體自然貞淑之行不為存亡改意可謂節行不虧汚者矣詩曰髧音蓞彼兩髦實惟我儀之死矢靡他此之謂也後漢光烈隂皇后諱麗華南陽新野人初光武適新野聞后美心恱之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得隂麗華更始元年六月遂納后於宛當成里時年十九及光武為司𨽻校尉方西之洛陽令后歸新野及鄧奉起兵后兄識為之將后隨家屬徙淯音育陽止奉舍光武即位令侍中傅俊迎后與胡陽寧平主諸宫人俱到洛陽以后為貴人帝以后雅性寬仁欲崇以尊位后固辭以郭氏有子終不肯當故遂立郭皇后建武四年從征彭寵生顯宗於元氏九年有盜劫兼入聲殺后母鄧氏及弟欣音銀帝甚傷之乃詔大司空曰吾微賤之時娶於隂氏因將兵征伐遂各分離幸得安全俱脫虎口以貴人有母儀之美宜立為后而固辭弗敢當列於媵音孕妾朕嘉其義讓許封諸弟未及爵土而遭患逢禍母子同命愍音閔傷于懷小雅曰將恐將懼惟豫與汝將安將樂汝轉棄豫風人之戒可不慎乎其追爵諡音示貴人父陸為宣恩哀侯弟欣為宣義恭侯以弟就嗣哀侯後及尸柩音舊在堂使大中大夫拜授印綬如在國列侯禮魂而有靈嘉其寵榮十七年郭后廢遂立為皇后后在位恭儉少嗜音視玩不喜笑謔香入聲性仁孝多矜慈七嵗失父雖已數十年言及未嘗不流涕帝見常歎息顯宗即位尊后為皇太后永平三年冬帝從太后幸章陵置酒舊宅㑹隂鄧故人諸家子孫並受賞賜七年崩在位二十四年年六十合葬原陵明帝性孝愛追慕無已十七年正月當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即案厯明旦日吉遂率百官及故客上陵其日降甘露於陵樹帝令百官采取以薦㑹畢帝從席前伏御牀視太后鏡奩音亷中物感動悲涕令易脂澤裝具左右皆泣莫能仰視焉明德馬皇后諱某伏波將軍援之小女也少喪父母兄客卿敏慧早夭母藺音吝夫人悲傷發疾慌荒上聲惚音忽后時年十嵗幹理家事勑制僮御內外咨稟事同成人初諸家莫知者後聞之咸歎異焉后嘗久疾太夫人令筮之筮者曰此女雖有患狀而當大貴兆不可言也後又呼相者使占諸女見后大驚曰我必為此女稱臣然貴而少子若養它子者得力乃當踰於所生以選入太子宫時年十三奉承隂后傍接同列禮則修備上下安之遂見寵異常居後堂顯宗即位以后為貴人時后前母姊女賈氏亦以選入生肅宗帝以后無子命令養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫育勞悴音萃過於所生肅宗亦孝性淳篤恩性天至母子慈愛始終無纎介之間后常以皇嗣未廣每懷憂歎薦達左右若恐不及後宫有進見者每加慰納若數所寵引輒增隆遇永平三年春有司奏立長秋宫帝未有所言皇太后曰馬貴人德冠後宫即其人也遂立為皇后先是數日夢有小飛蟲無數赴著身又入皮膚中而復飛出既正位宫闈愈自謙肅身長七尺二寸方口美髮能誦易好讀春秋楚辭尤善周官董仲舒書常衣大練裙不加緣朔望諸姬主朝請望見后袍疏粗粗同反以為綺縠就視乃笑后辭曰此繒音憎特宜染色故用之耳六宫莫不歎息帝嘗幸苑囿離宫后輒以風邪露霧為戒辭意欵備多見詳擇帝幸濯龍中並召諸才人下邳音丕王已下皆在側請呼皇后帝笑曰是家志不好樂雖來無歡是以遊娛之事希嘗從焉十五年帝案地圖將封皇子悉半諸國后見而言曰諸子裁食數縣於制不已儉乎帝曰我子豈宜與先帝子等乎嵗給二千萬足矣時楚獄連年不斷囚相證引坐繫者甚衆后慮其多濫乘間言及惻然帝感悟之夜起仿音旁偟音皇為思所納卒多有所降宥時諸將奏事及公卿較音教議難平者帝數以試后后輒分解趣音娶理各得其情每於侍執之際輒言及政事多所毗音琵補而未嘗以家私干欲寵敬日隆始終無衰及帝崩肅宗即位尊后曰皇太后諸貴人當徙居南宫太后感析别之懷各賜王赤綬加安車駟馬白越三千端雜帛二千匹黃金十斤自撰顯宗起居注削去兄防參醫藥事帝請曰黃門舅旦夕供養且一年既無褒異又不録勤勞無乃過乎太后曰吾不欲令後世聞先帝數親後宫之家故不著也建初元年欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此上奏宜依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黃霧四塞不聞澍音樹雨之應又田蚡墳上聲竇嬰寵貴橫恣傾覆之禍為世所傳故先帝防慎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國嘗謂我子不當與先帝子等今有司奈何欲以馬氏比隂氏乎吾為天下母而身服大練食不求甘左右但著帛布無香薰之飾者欲身率下也以為外親見之當傷心自勑但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍倉頭衣緑褠音溝單衣領袖正白顧視御者不及遠矣故不加譴牽去聲怒但絶嵗用而已兾以默愧其心而猶懈怠無憂國忘家之慮知臣莫若君况親屬乎吾豈可上負先帝之㫖下虧先人之德重襲音習西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病如令不諱使臣長抱刻音克骨之恨宜及吉時不可稽音雞留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受髙祖約無軍功非劉氏不侯今馬氏無功於國豈得與隂郭中興之后等耶常觀富貴之家祿位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求溫飽耳今祭祀則受四方之珍衣食則䝉御府餘資斯豈不足而必當得一縣乎吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異榖價數倍憂惶晝夜不安坐卧而欲先營外封違慈母之拳拳乎吾素剛急有胸中氣不可不順也若隂陽調和邊境清靜然後行子之志吾但當含飴音移弄孫不能復關政矣時新平主家御者失火延及北閣後殿太后以為已過起居不歡時當謁原陵自引守備不慎慙見陵園遂不行初太夫人葬起墳微高太后以為言兄廖等即時减削其外親有謙素義行者輒假借溫言賞以財位如有纎介則先見嚴恪康入聲之色然後加譴其美車服不軌音詭法度者便絶屬籍遣歸田里廣平巨鹿樂成王車騎朴素無金銀之飾帝以白太后太后即賜錢各五百萬於是內外從化被服如一諸家惶恐倍於永平時乃置織室蠶於濯龍中數往觀視以為娛樂常與帝旦夕言道政事及教授諸小王論議經書述叙平生雍和終日四年天下豐稔任上聲方垂無事帝遂封三舅廖防光為列侯並辭讓願就關內侯太后聞之曰聖人設教各有其方知人情性莫能齊也吾少壯時但慕竹帛志不顧命今雖已老而復戒之在得故日夜惕音剔厲音利思自降損居不求安食不念飽兾乘此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉萬年之日長恨矣廖等不得已受封爵而退位歸第焉太后其年寢疾不信巫祝小醫數勑絶禱音島祀至六月崩在位二十三年年四十餘合葬顯節陵和熹鄧皇后諱綏音雖太傅禹之孫也父訓護羌校尉母隂氏光烈皇后從弟女也后年五嵗太傅夫人愛之自為翦髮夫人年髙目冥誤傷后額忍痛不言左右見者怪而問之后曰非不痛也太夫人哀憐為斷髮難傷老人意故忍之耳六嵗能史書十二通詩論語諸兄每讀經傳輒下意難問志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉博士耶后重違母言晝修婦業暮誦經典家人號曰諸生父訓異之事無大小輒與詳議永元四年當以選入㑹訓卒后晝夜號泣終三年不食鹽菜憔音樵悴毁容親人不識之后嘗夢捫天蕩蕩正青若有鍾乳狀乃仰漱飲之以訊諸占夢言堯夢攀天而上湯夢及天而咶音是之斯皆聖王之前占吉不可言又相者見后驚曰此成湯之法家人竊喜而不敢宣后叔父陔音該言嘗聞活千人者子孫有封兄訓為謁者使修石臼河嵗活數千人天道可信家必䝉福初太傅禹歎曰吾將百萬之衆未嘗妄殺一人其後世必有興者七年后復與諸家子俱選入宫后長七尺二寸姿顔姝音樞麗絶異於衆左右皆驚八年冬入掖音亦庭為貴人時年十六恭肅小心動有法度承事隂后夙夜戰兢接撫同列常克己以下之雖宫人𨽻役皆加恩借帝深嘉愛焉及后有疾特令后母兄弟入侍醫藥不限日數后言於帝曰宫禁至重而使外舍久在內省上令陛下有幸私之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂深自抑損誠難及也每有宴音燕㑹諸姬貴人競自修整簪珥光采袿音圭裳鮮明而后獨著素裝服無飾其衣有與隂后同色者即時解易若並時進見則不敢正坐離立行則僂音縷身自卑帝每有所問常逡巡後對不敢先隂后言帝知后勞心曲體歎曰修德之勞乃如是乎後隂后漸疏每當御見輒辭以疾時帝數失皇子后憂繼嗣不廣恆垂涕歎息數選進才人以博帝意隂后見后德稱日盛不知所為遂造祝詛欲以為害帝嘗寢病危甚隂后密言我得意不令鄧氏復有遺類后聞乃對左右流涕言曰我竭誠盡心以事皇后竟不為所祐而當獲罪於天婦人雖無從死之義然周公身請武王之命越姬心誓必死之分上以報帝之恩中以解宗族之禍下不令隂氏有人彘之譏即欲飲藥宫人趙玉者固禁之因詐言屬有使來上疾已愈后信以為然乃止明日帝果瘳音抽十四年夏隂后以巫蠱音古事廢后請救不能得帝便屬意焉后愈稱疾篤深自閉絶㑹有司奏建長秋宫帝曰皇后之尊與朕同體承宗廟母天下豈易哉唯鄧貴人德冠後庭乃可當之至冬立為皇后辭讓者三然後即位手書表謝深陳德薄不足以充小君之選是時方國貢獻競求珍麗之物自后即位悉令禁絶嵗時但供紙墨而已帝每欲官爵鄧氏后輒哀請謙讓故兄隲音質終帝世不過虎賁音奔中郎將元興元年帝崩長子平原王有疾而諸皇子夭歿前後十數後生者輒隱祕養於人間殤音傷帝生始百日后乃迎立之尊后為皇太后太后臨朝和帝葬後宫人並歸園太后賜周馮貴人䇿曰朕與貴人託配後庭共歡等列十有餘年不獲福祐先帝早棄天下孤心煢煢音瓊靡所瞻仰夙夜永懷感愴音創發中今當以舊典分歸後園慘結增歎燕燕之詩曷能喻焉其賜貴人王青蓋車采飾輅音路驂音參馬各一駟黃金三十斤雜帛三千匹白越四千端又賜馮貴人王赤綬以未有頭上步搖環珮加賜各一具是時新遭大憂法禁未設宫中亡大珠一篋太后念欲考問必有不辜乃親閲音悅宫人觀察顔色即時首服又和帝幸人吉成御者共枉吉成以巫蠱事遂下掖庭考訊辭證明白太后以先帝左右待之有恩平日尚無惡言今反若此不合人情更自呼見實核音核果御者所為莫不歎服以為聖明常以鬼神難徵淫祀無福乃詔有司罷諸祠官不合典禮者又詔赦除建武以來諸犯妖惡及馬竇家屬所被禁錮音固者皆復之為平人减太官導官尚方內者服御珍膳靡麗難成之物自非供陵廟稻粱米不得導擇朝夕一肉飯而已舊太官湯官經用嵗且二萬萬太后勑止曰殺省珍費自是裁數千萬及郡國所貢皆减其過半悉斥賣上林鷹犬其蜀漢扣音口器九帶佩刀並不復調止畫工三十九種又御府尚方織室錦繡氷紈綺縠金銀珠玉犀象玳玳同瑁雕鏤音漏玩弄之物皆絶不作離宫别館儲峙遲上聲米糒音敗薪炭悉令省之又詔諸園貴人其宫人有宗室同族若羸音纍老不任使者令園監實核上名自御北宫增喜觀閲問之恣其去留即日免遣者五六百人及殤帝崩太后定䇿立安帝猶臨朝政以連遭大憂百姓苦役殤帝康陵方中祕藏及諸工作事事减約十分居一詔告司𨽻校尉河南尹南陽太守曰每覽前代外戚賓客假借威權輕薄􅢽宗去聲詷音洞至有濁亂奉公為人患苦咎在執法怠懈不輒行其罰故也今車騎將軍隲等雖懷敬順之志而宗門廣大姻戚不少賓客姦猾多干禁憲其明加檢勑勿相容護自是親屬犯罪無所假貸太后愍隂氏之罪廢赦其徙者歸鄉勑還資財五百餘萬永初元年爵號太夫人為新野君萬户供湯沐邑二年夏京師旱親幸洛陽寺録寃獄有囚實不殺人而被考自誣羸困輿見畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵低上聲罪行未還宫澍雨大降三年秋太后體不安左右憂惶禱請祝辭願得代命太后聞之即譴怒切勑掖庭令以下但使謝過祈音其福不得妄生不祥之言舊事嵗終當享遣衛士大儺音那逐疫音役太后以隂陽不和軍旅數興詔饗㑹勿設戲作樂减逐疫侲音真子之半悉罷象橐音託駝音陀之屬豐年復故太后自入宫掖從曹大家受經書兼天文算數晝省王政夜則誦讀而患其謬音繆誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀讎校傳記事畢奏御賜葛布各有差又詔中官近臣於東觀受讀經傳以教授宫人左右習誦朝夕濟濟及新野君薨太后自侍疾病至乎終盡憂哀毁損事加於常贈以長公主赤綬東園祕器玉衣繡衾又賜布三萬匹錢三千萬隲等遂固讓錢布不受使司空持節護喪事儀比東海恭王諡曰敬君太后諒暗菴同既終久旱太后比三日幸洛陽録囚徒理出死罪三十六人耐罪八十人其餘减罪死右趾已下至司冦七年正月初入太廟齊七日賜公卿百僚各有差庚戌謁宗廟率命婦羣妾相禮儀與皇帝交獻親薦成禮而還因下詔曰凡供薦新味多非其節或鬱養强熟或穿掘萌牙味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種自太后臨朝水旱十載四夷外侵盜賊內起每聞人饑或達旦不寐而躬自减徹以救灾厄音厄故天下復平嵗還豐穰音禳永寧二年二月寢病漸篤乃乘輦於前殿見侍中尚書因北至太子新所繕宫還大赦天下賜諸園貴人王主羣僚錢布各有差詔曰朕以無德託母天下而薄祐不天早離大憂延平之際海內無主元元厄運危於纍卵勤勤苦心不敢以萬乘為樂上欲不欺天愧先帝下不違人負宿心誠在濟度百姓以安劉氏自謂感徹天地當䝉福祚音胙而喪禍內外傷痛不絶頃以廢病沉滯久不得侍祠自力上原陵加咳音慨逆唾血遂至不解存亡大分無可奈何公卿百官其勉盡忠恪以輔朝廷三月崩在位二十年年四十一合葬順陵晉文明王皇后諱元姬東海郯音談人也父肅魏中領軍蘭陵侯后年八嵗誦詩論尤善喪服茍有文義目所一見必貫於心年九嵗遇母疾扶侍不捨左右衣不解帶者久之每先意候指動中所適由是父母令攝家事每盡其理祖朗甚愛異之曰興吾家者必此女也惜不為男矣年十二朗薨后哀戚哭泣發於自然其父益加敬異既笄歸于文帝生武帝及遼東悼王定國齊獻王攸城陽哀王兆廣漢殤王廣德京兆公主后事舅姑盡婦道謙冲接下嬪御有序及居父喪身不勝衣言與淚俱時鍾㑹以才能見任后每言於帝曰㑹見利忘義好為事端寵過必亂不可大任㑹後果反武帝受禪音膳尊為皇太后宫曰崇化初置宫卿后雖處尊位不忘素業躬執紡績器服無文御浣完上聲濯之衣食不參味而敦睦九族垂心萬物言必典禮浸潤不行四年后崩時年五十二合葬崇陽陵唐髙祖太穆順聖皇后竇氏京兆平陵人父毅音義在周為上柱國尚武帝姊襄陽長公主入隋為定州總管神武公后生髮垂過頸經上聲三嵗與身等讀女誡列女等傳一過輒不忘武帝愛之養宫中異它甥時突厥女為后無寵后密諫曰吾國未靖虜且强願抑情撫接以取合從則江南關東不吾梗更上聲武帝嘉納及崩哀毁同所生聞隋髙祖受禪自投牀下曰恨我非男子不能救音救舅家禍毅遽掩其口曰毋妄言赤吾族嘗謂主曰此女有竒相且識不凡何可妄與人因畫二孔雀屏間請昏者使射二矢隂約中目則許之射者閲數十皆不合髙祖最後射中各一目遂歸於帝始元貞太后羸老有疾而性素嚴諸姒娣皆畏莫敢侍后事之獨怡謹盡孝或淹月不釋衣履工為篇章規誡文有雅體又善書與高祖書相雜人不辨也崩於涿音卓郡年四十五帝在煬帝時多畜善馬后見曰上性樂此盍音合以獻徒留之速罪無益也不聽頃果坐譴帝後見隋政亂多妄誅殛音棘乃為自安計數奏鷹犬異駒煬帝果喜擢位將軍因泣謂諸子曰早用而母言得此久矣帝有天下詔即所葬園為壽安陵諡曰穆及祔音附獻陵尊為太穆皇后始太宗生有二龍之符后於諸子中愛視最篤後即位過慶善宫覽觀哽欷音稀顧侍臣曰朕生於此今母后永違育我之德不可報因號慟左右皆流涕乃享后于正寢它日幸九成宫夢后若平生既寤潸音刪然不自勝明日詔有司大發倉賑音震貧瘠音籍以為后報焉上元中益諡太穆神皇后太宗文德順聖皇后長孫氏河南洛陽人其先魏拓音託拔音跋氏後為宗室長因號長孫髙祖稚音治大丞相馮翊音翼王曽祖裕平原公祖兕音姒左將軍父晟音盛字季涉經史趫音驕鷙音至曉兵仕隋為右驍衛將軍后喜圖傳視古善惡以自鑒矜尚禮法晟兄熾音幟為周通道館學士嘗聞太穆勸撫突豚入聲厥女心志之語晟曰此明睿音鋭人必有竒子不可以不圖昏故晟以女太宗后歸寧舅高士亷妾見大馬二丈立后舍外懼占之遇坤之泰卜者曰坤順承天載物無疆馬地類也之泰是天地交而萬物通也又以輔相天地之宜繇音宙協音俠歸妹婦人事也女處尊位履中而居順后妃象也時隱太子釁欣去聲䦧馨入聲已搆后內盡孝事髙祖謹承諸妃消釋嫌猜及帝授甲宫中后親慰勉士皆感奮分去聲尋為皇太子妃俄為皇后性約素服御取給則止益觀書雖容櫛臻入聲不少廢與帝言或及天下事辭曰牝貧上聲雞司晨家之窮也可乎帝固要之訖不對後廷有被罪者必助帝怒請繩治俟意解徐為開治終不令有寃卞嬪音貧生豫章公主而死后視如所生媵音孕侍疾病輟音拙所御飲藥資之下懷其仁兄無忌於帝本布衣交以佐命為元功出入卧內帝將引以輔政后固謂不可乘間曰妾託體紫宫尊貴已極不願私親更據權于朝漢之吕霍可以為誡帝不聽自用無忌為尚書僕射音夜后密諭令牢讓帝不獲已乃聽后喜見顔間異母兄安業無行父喪逐后無忌還外家后貴未嘗以為言擢位將軍後與李孝常等謀反將誅后叩頭曰安業罪死無赦然向遇妾不以慈户知之今論如法人必謂妾釋憾含去聲於兄無乃為帝纍乎遂得减流越嶲音髓太子承乾乳媪音襖請增東宫什器后曰太子患無德與名器何請為從幸九成宫方屬疾㑹柴紹等急變聞帝甲而起后輿疾以從宫司諌止后曰上震驚吾可自安疾稍亟音棘太子欲請大赦泛度道人祓音拂塞災㑹后曰死生有命非人力所支若修福可延吾不為惡使善無效我尚何求且赦令國大事佛老異方教耳皆上所不為豈宜以吾亂天下法太子不敢奏以告房𤣥齡𤣥齡以聞帝歎美而羣臣請遂赦帝既許后固爭止及大漸與帝訣時𤣥齡小譴就第后曰𤣥齡久事陛下預竒計祕謀非大故願勿置也妾家以恩澤進無德而祿易以取禍無屬樞柄以外戚奉朝請足矣妾生無益於時死不可以厚葬願因山為隴無起墳無用棺槨器以瓦木約費送終是妾不見忘也又請帝納忠容諌勿受讒省遊畋音田作役死無恨崩年三十六后嘗采古婦人事著女則十篇又為論斥漢之馬后不能檢抑外家使與政事乃戒其車馬之侈此謂開本源恤末事常誡守者吾以自檢故書無條理勿令至尊見之及崩宫司以聞帝為之慟示近臣曰后此書可用垂後我豈不通天命而割情乎顧內失吾良佐哀不可巳巳諡曰文德葬昭陵因九嵕音棕山以成后志帝自著表序始末揭陵左上元中益諡文德聖皇后太宗賢妃徐惠湖州長城人生五月能言四嵗通論語詩八嵗自曉屬文父孝德試使擬離騷為小山篇曰仰幽巖而流盼撫桂枝以凝想將千齡兮此遇荃何為兮獨往孝德大驚知不可掩於是所論著遂盛傳太宗聞之召為才人手未嘗廢卷而辭致贍蔚又無淹思帝益禮顧擢孝德水部員外郎惠再遷充容貞觀末數調兵討定四夷稍稍治宫室百姓勞怨惠上疏極諫且言東戍遼海西討崑丘士馬罷音疲耗蒿去聲漕餉音餉漂音飄沒捐有盡之農趨無窮之壑圖未獲之衆喪已成之軍故地廣者非常安之術也人勞者為易亂之符也又言翠微玉華等宫雖因山藉水無築搆之苦而工力和僦秋去聲不謂無煩有道之君以逸逸人無道之君以樂樂身又言伎音妓巧為喪國斧斤珠玉為蕩心鴆音鴆毒侈麗纎美不可以不遏安入聲志驕於業泰體逸於時安其剴音槩切精詣大略如此帝善其言優賜之帝崩哀慕成疾不肯進藥曰帝遇我厚得先狗馬侍園寢吾志也復為詩連珠以見意永徽元年卒年二十四贈賢妃陪葬昭陵石室德宗賢妃韋氏戚里舊族也祖濯尚定安公主初為良娣德宗貞元四年册拜賢妃宫壼音悃事無不聽而性敏淑言動皆有繩矩帝寵重之後宫莫不師其行帝崩自表留奉崇陵園元和四年薨順宗莊憲皇后王氏琅音郎邪音耶人祖難得有功名於世代宗時后以良家選入宫為才人順宗在藩帝以才人幼故賜之為王孺人生憲宗順宗在東宫册為良娣后性仁順宫中化其德莫不柔雍順宗即位疾已綿頓后侍醫藥不少怠將立后㑹病棘而止憲宗內禪尊為太上皇后元和元年乃上尊號曰皇太后后謹畏深抑外家無毫絲假貸訓厲內職有古后妃風十年崩年五十四葬豐陵憲宗懿安皇后郭氏汾音墳陽王子儀之孫父曖音愛尚升平公主實生后憲宗為廣陵王聘以為妃順宗以其家有大功烈而母素貴故禮之異諸婦是生穆宗元和元年進册貴妃八年羣臣三請立為后帝以嵗子午忌章報聞罷穆宗嗣位上尊號皇太后贈曖太尉母齊國大長公主擢兄釗音昭刑部尚書鏦音聰金吾大將軍后移御興慶宫凡朔望三朝帝率百官詣宫門為壽帝崩中人有為后謀稱制者后怒曰吾效武氏耶今太子雖幼尚可選重德為輔吾何與外事哉敬宗立號太皇太后寶厯倉卒后召江王嗣皇帝位是為文宗文宗性謹孝事后有禮凡羞果鮮珍及四方竒奉必先獻宗廟三宫而後御之武宗喜畋游角武抃音卞擇五坊小兒得出入禁中它日問后起居從容請曰如何可為盛天子后曰諌臣章疏宜審覽度可用用之有不可以詢宰相毋拒直言勿納偏言以忠良為腹心此盛天子也帝再拜還索諌章閲之往往道游獵事自是畋幸稀小兒武抃等不復橫賜矣宣宗時崩有司上尊諡葬景陵外園懿宗咸通中從禮官王皥音昊言詔后主袝憲宗廟宋真宗章穆郭皇后太原人宣徽南院使守文第二女真宗在襄邸低上聲太宗為聘之封魯國夫人進封秦國真宗嗣位立為皇后謙約惠下性惡奢靡族屬入謁禁中服飾華侈必加戒勗音旭有以家事求言於上者后終不許兄子出嫁以貧欲祈恩賚但出裝具給之上尤加禮重仁宗慈聖光獻曹皇后真定人樞密使曹武惠王彬之孫也明道二年詔聘入宫景祐元年冊為皇后性慈儉重稼穡嘗於禁苑種榖親蠶善飛白書慶厯八年閏正月帝將以望夕再張燈后諌止後三日衛卒數人作亂夜越屋叩寢殿后方侍帝聞變遽起帝欲出后閉閣擁持趣音促呼都知王守忠使引兵入賊傷宫嬪殿下聲徹帝所宦者以乳嫗餘去聲毆小女子紿台上聲奏后叱之曰賊在近殺人敢妄言耶后度賊必縱火隂遣人挈牽入聲水踵其後果舉炬焚簾水隨滅之是夕所遣宦侍后皆親剪其髮諭之曰明日行賞用是為驗故爭盡死力賊即禽滅閣內妾與卒亂當誅祈哀幸姬姬言之帝貸其死后具衣冠見請論如法曰不如是無以肅清禁掖帝命坐后不可立請移數刻卒誅之張妃怙寵上僣欲假后蓋出游帝使自來請后與之無靳斤去聲色妃喜還以告帝曰國家文物儀章上下有秩汝張之而出外廷不汝置妃不懌音亦而輟英宗方四嵗育禁中后拊鞠周盡逮入為嗣子贊䇿居多帝夜暴疾崩后悉斂諸門鑰音藥置於前召皇子入及明宰臣韓琦等至奉英宗即位尊后為皇太后檢柅尼上聲曹氏及左右臣僕毫分不以假借宫省肅然神宗立尊為太皇太后名宫曰慶壽帝致極誠孝所以承迎娛悅無所不盡后亦慈愛天至或退朝稍晚必自至屏扆衣上聲候矚音燭間親持膳飲以食帝外家男子舊毋得入謁后春秋髙弟佾音逸亦老帝數言宜使入見輒不許他日佾侍帝帝復為請乃許之因偕詣后閣少焉帝先起若令佾得伸親親意后遽曰此非汝所當得留趣遣出晚得水疾侍醫莫能治元豐二年崩初王安石當國變亂舊章后乘間語神宗謂祖宗法度不宜輕改熙寧宗祀前數日帝至后所后曰吾昔聞民間疾苦必以告仁宗因赦行之今亦當爾帝曰今無他事后曰吾聞民間甚苦青苗助役宜罷之安石誠有才學然怨之者甚衆帝欲愛惜保全之不若暫出之於外帝悚音聳聽埀欲止復為安石所持遂不果帝嘗有意於燕薊音計已與大臣定議乃詣慶壽宫白其事后曰儲蓄賜豫備乎鎧音愷仗士卒精乎帝曰固已辦之矣后曰事體至大吉凶悔吝生乎動得之不過南面受賀而已萬一不諧則生靈所係未易以言茍可取之太祖太宗收復久矣何待今日帝曰敢不受教蘇軾音式以詩得罪下御史獄人以為必死后違豫中聞之謂帝曰嘗憶仁宗以制科得軾兄弟喜曰吾為子孫得兩宰相今聞軾以作詩繫獄得非仇人中傷之乎捃君上聲至於詩其過微矣吾疾勢已篤不可以寃濫致傷中和宜熟察之帝涕泣軾由此得免馮賢妃東平人曽祖炳知雜御史祖起兵部侍郎妃以良家女九嵗入宫及長得侍仁宗生邢魯國二公主封始平郡君帝將登其品秩力辭不拜林美人得幸神宗生二王而歿王尚幼妃保育如己子在禁掖幾六十年始終五朝動循禮度薨年七十七贈賢妃英宗宣仁聖烈髙皇后亳音薄州䝉城人曽祖瓊祖繼勳皆有勳王室至節度使母曹氏慈聖光獻皇后姊也故后少鞠宫中時英宗亦在帝所與后年同仁宗謂慈聖異日必以為配既長遂成昏濮邸生神宗皇帝岐王皓音昊嘉王頵音君壽康公主治平二年冊為皇后后弟內殿崇班士林供奉久帝欲遷其官后謝曰士林獲升朝籍分量已過豈宜援先后家比辭之神宗立尊為皇太后居寶慈宫帝屢欲為髙氏營大第后不許久之但斥望春門外隙音綌地以賜凡繕營百役費悉出寶慈不調大司農一錢元豐八年帝不豫浸劇音屐宰執王圭等入問疾乞立延安郡王為皇太子太后權同聽政帝頷音函之圭等見太后簾下后泣撫王曰兒孝順自官家服藥未嘗去左右喜學書已誦論語七卷絶不好弄乃令王出簾外見圭等是日降制立為皇太子初岐嘉二王日問起居至是毋令輒入又隂勑中人梁惟簡使其妻製十嵗兒一黃袍懷以來蓋密為踐阼倉卒備也哲宗嗣位尊為太皇太后驛召司馬光吕公著未至迎問今日設施所宜先未及條上已散遣修京城役夫减皇城覘音苫卒止禁庭工技廢導洛司出近侍尤無狀者戒中外毋苛斂寬民間保户馬事由中㫖王圭等弗預音豫知又起文彥博於既老遣使勞諸途諭以復祖宗法度為先務且令亟疏可用者從父遵裕坐西征失律抵罪蔡確音殼欲獻諛音㬰以固位乞復其官后曰遵裕靈武之役塗炭百萬先帝中夜得報起環榻行徹旦不能寐聖情自是驚悸葵去聲馴致大故禍由遵裕得免刑誅幸矣先帝肉未冷吾何敢顧私恩而違天下公議確悚栗而止光公著至並命為相使同心輔政一時知名士彚音謂進於廷凡熙寧以來政事弗便者次第罷之於是以常平舊式改青苖以嘉祐差役參募音慕役除市易之法逭音換茶鹽之禁舉邊寨寨同不毛之地以賜西戎而宇內復安契音挈丹主戒其臣下勿復生事於疆場曰南朝盡行仁宗之政矣蔡確坐車蓋亭詩謫音責嶺表后謂大臣曰元豐之末吾以今皇帝所書佛經出示人是時惟王圭曽奏賀遂定儲極且以子繼父有何間言而確自謂有定䇿大功妄扇事端規為異時眩音縣惑地吾不忍明言姑託訕山去聲上為名逐之耳此宗社大計姦邪怨謗所不暇恤也廷試舉人有司請循天聖故事帝后皆御殿后止之又請受册寶於文德后曰母后當陽非國家美事况天子正衙豈所當御就崇政足矣上元燈宴后母當入覲音近止之曰夫人登樓上必加禮是由吾故而越典制於心殊不安但令賜之燈燭遂嵗以為常姪公繪公紀當轉觀察使力遏之帝請至再僅遷一秩終后之世不復改又以官冗當汰詔損外氏恩四之一以為宫掖先臨政九年朝廷清明華夏綏音雖定宋用臣既被斥祈神宗乳媪入言之冀復得用后見其來曰汝來何為得非為用臣等游說乎且汝尚欲如曩囊上聲日求內降干撓國政耶若復爾吾即斬汝媪大懼不敢出一言自是內降遂絶力行故事抑絶外家私恩文思院奉上之物無問巨細終身不取其一人以為女中堯舜神宗欽聖憲肅向皇后河內人故宰相敏中曽孫也治平三年歸于潁音影邸封安國夫人神宗即位立為皇后帝不豫后贊宣仁后定建儲之議哲宗立尊為皇太后宣仁命葺音集慶壽故宫以居后后辭曰安有姑居西而婦處東瀆上下之分不敢徙遂以慶壽後殿為隆祐宫居之帝將卜后及諸王納婦后勑向族勿以女置選中族黨有欲援例以恩換閣職及為選人求京秩者且言有特㫖后曰吾族未省用此例何庸以私情撓公法一不與帝倉卒晏駕獨決䇿迎端王章惇音敦異議不能沮徽宗立請權同處分軍國事后以長君辭帝泣拜移時乃聽凡紹聖元符以還惇所斥逐賢大夫士稍稍收用之故事有如御正殿避家諱立誕節之類皆不用至聞賓召故老寬徭音遙息兵愛民崇儉之舉則喜見于色才六月即還政髙宗憲聖慈烈吳皇后開封人年十四髙宗為康王被選入宫后頗知書從幸四明衛士謀為變入問帝所在后紿之以免未幾帝航海有魚躍入御舟后曰此周人白魚之祥也帝大悅封和義郡夫人進封才人后益博習書史又善翰墨由是寵遇日至尋進貴妃顯仁太后亦愛后邢皇后崩顯仁以為言詔册為皇后顯仁性嚴肅后身承起居順適其意嘗繪古列女圖置座右為鑒又取詩序之義扁其堂曰賢志初伯琮以宗子召入宫命張氏育之后時為才人亦請得育一子於是得伯玖更名璩音渠中外議頗籍籍張氏卒併育于后后視之無間伯琮性恭儉喜讀書帝與后皆愛之封普安郡王后嘗語帝曰普安真天日之表也帝意决立為皇子封建王出璩居紹興髙宗內禪手詔后稱太上皇后居德壽宫上皇崩孝宗欲迎還大內后以上皇几筵在德壽宫不忍舍去因命所御殿曰慈福居焉嘗與光宗言及用人后曰宜崇尚舊臣嘉王侍側后勉以讀書辨邪正立綱常為先孝宗崩光宗疾未平不能執喪宰臣請埀簾主喪事后不可已而宰執請如唐肅宗故事羣臣發喪太極殿成服禁中許之后代行祭奠禮尋用趙汝愚請於梓宫前埀簾宣光宗手詔立皇子嘉王為皇帝翌日册夫人韓氏為皇后撤簾汝愚後以謫死中書舍人汪義端目汝愚為李林甫欲併逐其黨后聞而非之年八十三崩孝宗謝皇后丹陽人初被選入宫憲聖太后以賜普安郡王封咸安郡夫人王即位踰年進貴妃淳熙三年立為皇后后性儉慈减膳羊每食必先以進御服浣浣同濯衣有數年不易者弟淵以后貴授武翼郎后嘗戒之曰主上化行恭儉吾亦躬服浣濯爾宜崇謙抑遠驕侈後崩諡成肅元世祖昭睿順聖皇后名徹伯爾鴻吉哩氏濟寧忠武王按陳之女也生裕宗中統初立為皇后至元十年三月授册寶上尊號貞懿昭聖順天睿文光應皇后一日四怯薛官奏割京城外近地牧馬帝既允方以圖進后至帝前將諌先陽責太保劉秉忠曰汝漢人聰明者言則帝聽汝何為不諌向初到定都時若以地牧馬則可今軍民俱分業已定奪之可乎帝默然命寢其事后嘗於太府監支繒帛表裏各一帝謂后曰此軍國所需非私家物后何可得支后自是率宫人親執女工拘諸舊弓絃練之緝侵入聲為紬以為衣其韌音刃密比綾綺宣徽院羊臑音猱皮置不用后取之合縫為地毯貪上聲其勤儉有節而無棄物類如此十三年平宋幼主朝于上都大宴衆皆歡甚唯后不樂帝曰我今平江南自此不用兵甲衆人皆喜爾獨不樂何耶后跪奏曰妾聞自古無千嵗之國毋使吾子孫及此則幸矣帝以宋府庫故物各聚置殿廷上召后視之后遍視即去帝遣宦者追問后欲何所取后曰宋人貯蓄以遺其子孫子孫不能守而歸於我我何忍取一物耶待宋太后全氏甚厚其帽舊無前簷帝因射日色炫𤣥去聲目以語后后始製前簷又製衣前有裳無衽後長倍於前無領袖綴兩襻音盼以便弓馬時皆效之后性明達國初左右有力十四年二月崩成宗即位追諡焉國朝太祖孝慈昭憲至仁文德承天順聖髙皇后馬氏其先自宋太保默家于宿州閔子鄉新豐里世豪里中父馬公性剛直愛人喜施賙音周人之急如將不及母鄭氏早卒后幼父素與定遠人郭子興為刎頸之交遂以后託其家父卒子興育后同己女后自少貞靜端一孝敬慈惠聰明出人意表尤好詩書既笄嬪于太祖聖神文武欽明啓運俊德成功統天大孝髙皇帝誠敬感孚音夫內外咸譽之值嵗大歉音慊后從帝在軍嘗自忍饑懷糗休去聲餌脯修供帝未嘗乏絶造次顛沛恪遵婦道帝每有識記書札輒命后藏之倉卒取視后即於囊中出而進之未嘗脫誤帝焚香祝天願天命早有所付毋苦天下生民后謂帝曰方今豪傑並爭雖未知天命所歸以妾觀之惟以不殺人為本顛者扶之危者救之收集人心人心所歸即天命所在彼縱殺掠以失人心天之所惡雖其身亦難保也帝曰爾言深合我意明日冒雨歸語后曰昨聞爾言往來方寸間不能忘有一卒違令忽與婦人俱詰之不能隱吐實云掠得之我告之曰今日用兵所以禁亂若寡人之妻孤人之子適以生亂不即舍之吾必戮爾此卒感悟遂即舍之由爾之言也后曰用心如此何憂人心之不歸乎后初未有子撫育帝兄子文正姊子李文忠及沐英等數人愛如己出後太子諸王生恩無替焉帝帥師渡江后亦率諸將士妻妾繼至太平及居建康時吳漢接境戰無虛日親率妾媵完緝衣鞋助給將士夜分不寐時時左右帝規畫動合事機洪武元年春正月帝即位册為皇后因謂侍臣曰昔漢光武勞馮異曰倉卒蕪蔞亭豆粥滹音呼沱音陀河麥飯厚意久不報君臣之間始終保全朕念皇后起布衣同甘苦嘗從朕在軍倉卒自忍饑餓懷糗餌食朕比之豆粥麥飯其困尤甚昔唐太宗長孫皇后當隱太子搆隙之際內能盡孝謹承諸妃消釋嫌猜朕數為郭氏所疑朕徑情不恤將士或以服用為獻后先獻郭氏慰悅其意及欲危朕后輒為彌縫卒免於患殆又難於長孫皇后者朕或因服御詰怒小過輒為朕曰主忘昔日之貧賤耶朕復為惕然家之良妻猶國之良相豈忍忘之罷朝因以語后后曰妾聞夫婦相保易君臣相保難陛下既不忘妾於貧賤願無忘羣臣百姓於艱難且妾安敢比長孫皇后賢但願陛下以堯舜為法耳后既正位中宫益自勤勵督宫妾治女工夙興夜寐無時豫怠勸帝親賢務學隨事幾諌講求古訓諭告六宫孜孜不倦一日集女史清江范孺人等問曰自漢唐以來何后最賢家法何代最正對曰惟趙宋諸后多賢家法最正后於是命女史録其家法賢行每令誦而聽之曰不徒為吾今日法子孫帝王后妃皆當省覽此可以為萬世法也或曰宋朝過於仁厚后曰過於仁厚不猶愈於刻薄乎吾子孫茍能以仁厚為本至於三代不難矣仁厚雖過何害於人之國哉帝嘗謂后曰君者百責所萃一夫不得其所君之責也后即起拜曰妾聞古人有云一夫失所時豫之辜一民饑曰我饑之一民寒曰我寒之今陛下之言即古人之心也致謹於聖心加惠於窮民天下受其福妾亦與有榮焉又嘗從容告帝曰人主雖有明聖之資不能獨理天下必擇賢以圖治然世代愈降人無全材陛下於人材固能各隨其短長而用之然尤宜赦小過以全其人帝喜稱善一日聞得元府庫輸其貨寶至京師問帝曰得元府庫何物帝曰寶貨耳后曰元氏有此寶何以不能守而失之蓋貨財非可寶抑帝王自有寶也帝曰皇后之意朕知之矣但謂以得賢為寶耳后即拜謝曰誠如聖言妾每見人家産業厚則驕至時命順則逸生家國不同其理無二人之常情所當深戒妾與陛下同處窮約今富貴至此恆恐驕縱生於奢侈危亡起於忽微故世傳技巧為喪國斧斤珠玉為蕩心鴆音鴆毒誠哉是言但得賢才朝夕啓沃共保天下即大寶也顯名萬世即大寶也而豈在於物乎帝曰善嘗侍坐乾清宫語及窮約時事帝曰吾與爾跋涉艱難備嘗辛苦今日化家為國無心所得上感天地之德祖宗之恩然亦爾內助之功也后曰陛下一念救民之心格于皇天天命眷之祖宗祐之妾何力之有但願陛下不忘於窮約之時而警戒於治安之日妾亦不忘相從於患難而謹飭於朝夕則天地祖宗非惟庇佑於今日將為子孫無窮之福耳帝凡御膳后必躬自省視宫人請曰宫中人衆無煩聖體后曰吾固知宫中有人但婦之事夫不可不謹膳羞上進不可不蠲音涓潔脫有不至汝輩受責吾心豈安吾所以為此者一以敬上而不敢忽一以保汝輩免於責也豈為無人耶宫人聞之莫不感悅后聞女史論西漢竇太后好黃老顧而問曰黃老何如女史答曰清靜無為為本若絶仁棄義民復孝慈是也后曰不然孝慈即仁義事也詎音巨有絶仁義而為孝慈哉仁義乃為治之本乃曰絶之棄之非理也后令誦小學書注意聽之既而奏曰小學書言易曉事易行於人道無所不備真聖人之教法盍表章之帝曰然吾已令親王駙馬太學生咸講讀之矣后嘗聞元世祖后煮故弓絃事亦命取練之織為衾音欽裯以惠孤老每製衣裳餘帛緝為巾褥曰身處富貴當為天地惜物暴殄天上聲天物古人深戒也織工治絲有荒纇音耒棄遺者亦俾緝而織之以賜諸王妃公主謂曰生長富貴當知𧖟桑之不易此雖荒纇棄遺在民間猶為難得故織以示汝不可不知也平居服浣濯之衣不喜侈麗衾裯雖敝不忍易有言於后曰享天下至貴至富何庸惜此后曰吾聞古之后妃皆以富而能儉貴而能勤見稱於載籍蓋奢侈之心易萌崇高之位難處不可忘者勤儉不可恃者富貴也勤儉之心一移禍福之應響至每念及此自不敢有忽易之心耳宫人有過帝怒之后亦怒命左右執付宫正司議罪帝怒解問后曰爾不自責罰付之宫正司何也后曰妾聞賞罰惟公足以服人故不以喜而加賞不以怒而加刑喜怒之際而行賞罰必有偏重人議其私付之宫正司則當斟酌其輕重矣治天下者亦豈能人人自賞罰哉有司者論之耳帝曰爾亦怒之何也后曰當陛下怒時遽自罰之非惟宫人得重責陛下亦損中和之氣故妾之怒者所以解陛下之怒也帝喜后以不逮事舅姑為恨見帝追慕悲傷亦為之流涕晨夕禕翟從帝拜謁奉先殿每當祭躬治膳羞務盡誠敬接妃嬪以下有恩被寵顧有子者待之加厚語諸王妃公主曰無功受福造物所惡吾與若屬被金繡美飲食終日無所為當勤女工以報造物者太子諸王雖愛之甚篤勉令務學諄切懇至嘗曰汝父尊臨萬國身致太平亦由學以聚之爾小子當思繼繼繩繩以不辱所生又曰吾聞女史言鄧禹為將不妄殺人故其女為后吾家世忠厚至吾父雖無禹之功然平生急於義今日為后非偶然也汝輩異日有人民社稷之寄尤必積纍忠厚乃可長世切不可自恃而不務德謂事有偶然也汝切識之諸王或以衣服器皿相尚者后曰唐堯虞舜茅茨土階夏禹文王惡衣卑服汝父儉朴尤惡奢麗日夜憂勤以治天下汝輩無功錦衣玉食猶欲以服御相加何志氣不同如是乎惟當親師取友講論聖賢之學開明心志自無此氣習也后慈以接下親戚勳舊之家無不得其歡心命婦入朝不以尊貴臨之延接如家人禮遇水旱嵗凶進食必間設麥飯野蔬帝因告以賑恤之事后曰妾聞水旱無時無之賑恤之有方不如蓄積之先備卒不幸有九年之水七年之旱將何法以賑之帝深以為然嘗為帝言施恩欲溥遍然亦有等差衆庶日給固有艱難百官家在京者其鄉里遠近不同家貧富亦異而俸入有限慮或不給艱難必甚遇暑雨祁寒輒形於嗟歎帝感其意每遣存問周給之近臣及諸奏事官朝罷㑹食廷中后命中官取其飲食親嘗之滋味凉薄不㫖奏帝曰朝廷用天祿以養天下之賢故自奉欲其薄養賢欲其豐今之典大亨烹同者不能輯其下人惟奉上者甘㫖羣臣飲食皆不得其味豈陛下養賢之意乎上曰飲食之事朕不經心將謂羣臣皆得甘㫖豈意所司自分厚薄想羣臣欲言又難於啓齒事雖甚微所係亦大皇后今日不言朕豈知其如此亟音棘召光祿卿徐興祖等切責之興祖等皆慙服帝嘗臨太學祀先師孔子還后問曰太學生幾何帝曰數千又問悉有家乎曰亦多有之后曰善理天下者以賢才為本今人才衆多深足為喜但生員廩食於太學而妻子無所仰給彼寧無所纍於心乎帝即命月賜糧給其家以為常嘗謂帝曰事幾得失本君心之邪正天下安危係民情之苦樂又曰法屢更必弊法弊則姦生民數擾必困民困則亂生帝皆命女史書之后得疾帝寢食不安以語羣臣羣臣請禱祀山川遍求名醫后聞謂帝曰妾平生無疾今一旦得疾如此自度不能起死生有命禱祀求醫何益之有及疾亟帝問曰爾有身後之屬乎后曰陛下與妾起布衣今日陛下為億兆主妾為億兆母尊榮至矣尚何言惟感天地祖宗無忘布衣而已帝復問之后曰陛下當求賢納諫明政教以致雍熙教育諸子使進德修業帝曰吾已知之但老身何以為懷后復曰死生命也願陛下慎終如始使子孫皆賢臣民得所妾雖死如生也遂崩年五十一洪武壬戌八月丙戌也帝慟哭終身不復立后帝嘗罷朝內臣女史更進奏事不已帝悽然不懌曰皇后在吾豈有此煩聒哉后在時內政一不以煩帝帝從容甚適故不勝哀悼焉是嵗九月庚午葬鍾山孝陵諡曰孝慈皇后永樂元年六月丁巳加上尊諡孝慈昭憲至仁文德承天順聖髙皇后古今列女傳卷一
