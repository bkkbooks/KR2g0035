body:
  text: 古今列女傳巻二明解縉等撰周列國衛姑定姜者衛定公之夫人公子之母也公子既娶而死其婦無子畢三年之喪定姜歸其婦自送之至於野恩愛哀思悲心感慟立而望之揮泣垂涕乃賦詩曰燕燕于飛差池其羽之子于歸遠送于野瞻望不及泣涕如雨送去歸泣而望之又作詩曰先君之思以畜寡人君子謂定姜為慈姑過而之厚定公惡孫林父孫林父奔晉晉侯使郤犫音隙抽人姓名為請還定公欲辭定姜曰不可是先君宗卿之嗣也大國又以為請而弗許將亡雖惡之不猶愈於亡乎君其忍之夫安民而宥宗卿不亦可乎定公遂復之君子謂定姜能遠患難詩曰其儀不忒正是四國此之謂也定公卒立敬姒音似之子衎音侃人名為君是為獻公獻公居喪而慢定姜既哭而息見獻公之不哀也不内音納食飲歎曰是將敗衛國必先害善人夫禍衛國也夫吾不獲鱄音專人名也使主社稷大夫聞之皆懼孫文子自是不敢舍其重器於衛鱄者獻公弟子鮮也賢而定姜欲立之而不得後獻公暴虐慢侮定姜卒見逐走出亡至境使祝宗告亡且告無罪於廟定姜曰不可若令無神不可誣有罪若何告無也且公之行舍大臣而與小臣謀一罪也先君有冢鍾上聲卿以為師保而蔑綿入聲之二罪也余以巾櫛臻入聲事先君而暴妾使余三罪也告亡而已無告無罪其後賴鱄力獻公復得反國君子謂定姜能以辭教詩云我言惟服此之謂也鄭皇耳帥師侵衛孫文子卜追之獻兆於定姜曰兆如山林有夫出征而喪其雄定姜曰征者喪雄禦冦之利也大夫圖之衛人追之獲皇耳於大丘君子謂定姜達於事情詩云左之左之君子宜之此之謂也衛宣夫人者齊侯之女也嫁於衛至城門而衛君死保姆曰可以還矣女不聴遂入持三年之喪畢弟立請曰衛小國也不容二庖請願同庖終不聴衛君使人愬訴同於齊兄弟皆欲與君使人告女女終不聴乃作詩曰我心匪石不可轉也我心匪席不可巻也厄窮不閔勞辱不茍然後能自致也言不失也然後可以濟難矣衛宗二順者衛宗室靈王之夫人而及其傅妾也秦滅衛君乃封靈王世家使奉其祀靈王死夫人無子而守寡傅妾有子傅妾事夫人八年不衰供養愈謹夫人謂傅妾曰孺儒去聲子養我甚謹子奉祀而妾事我我不聊也且吾聞主君之母不妾事人今我無子於禮斥絀音出之人也而得留以盡其節是我幸也今又煩孺子不改故節我甚内慙慚同吾願出居外以時相見我甚便之傅妾泣而對曰夫人欲使靈氏受三不祥耶不幸早終是一不祥也夫人無子而婢妾有子是二不祥也夫人欲出居外使婢子居内是三不祥也妾聞忠臣事君無懈音戒倦時孝子養親患無日也妾豈敢以少貴之故變妾之節哉供養固妾之職也夫人又何勤乎夫人曰無子之人而辱主君之母雖子欲爾衆人謂我不知禮也吾終願居外而已傅妾退而謂其子曰吾聞君子處順奉上下之儀修先古之禮此順道也今夫人難我將欲居外使我居内此逆也處逆而生豈若守順而死哉遂欲自殺其子泣而守之不聴夫人聞之懼遂許傅妾留終年供養不衰君子曰二女相讓亦誠君子可謂行成於内而名立於後世矣詩曰我心匪石不可轉也此之謂也齊田稷子之母也田稷子相齊受下吏之貨金百鎰音逸二十兩曰鎰以遺其母母曰子為相三年矣禄未嘗多若此也豈修士大夫之費哉安所得此對曰誠受之于下其母曰吾聞士修身潔行不為茍得竭情盡實不行詐偽非義之事不計於心非理之利不入於家言行若一情貌相副今君設官以待子厚禄以奉子言行則可以報君夫為人臣而事其君猶為人子而事其父也盡力竭能忠信不欺務在効忠必死奉命亷潔公正故遂而無患今子反是遠忠矣夫為人臣不忠是為人子不孝也不義之財非吾有也不孝之子非吾子也子起田稷子慙而出反其金自歸罪於宣王請就誅焉宣王聞之大賞其母之義遂舍音釋稷子之罪復其相位而以公金賜母君子謂稷母亷而有化詩曰彼君子兮不素餐兮無功而食禄不為也况於受金乎齊相晏子僕御之妻也號曰命婦晏子將出命婦窺其夫為相御擁大蓋䇿駟馬意氣揚揚甚自得也既歸其妻曰宜矣子之卑且賤也夫曰何也妻曰晏子長不滿六尺身相齊國名顯諸侯今者吾從門間觀其志氣恂恂自下思念深矣今子身長八尺乃為之僕御耳然子之意揚揚若自足者妾是以去也其夫謝曰請自改何如妻曰是懷晏子之智而加以八尺之長也夫躬仁義事明主其名必揚矣且吾聞寧榮於義而賤不虛驕以貴於是其夫乃深自責學道謙遜常若不足晏子恠而問其故具以實對於是晏子賢其能納善自改升諸景公以為大夫顯其妻以為命婦君子謂命婦知善故賢人之所以成者其道博矣非特師傅朋友相與切嗟也妃匹亦居多焉詩云髙山仰止景行行止言當常嚮為其善也齊靈仲子者宋侯之女齊靈公之夫人也初靈公娶於魯聲姬生子光以為太子夫人仲子與其娣音弟戎子皆嬖於公仲子生子牙戎子請以牙為太子代光公許之仲子曰不可夫廢常不祥間諸侯難失謀夫光之立也列於諸侯矣今無故而廢之是專絀諸侯而以難犯不祥也君必悔之在我而已仲子曰妾非讓也誠禍之萌也以死爭之公終不聴遂逐太子光而立牙為太子髙厚為傅靈公疾髙厚微迎光及公薨崔杼音佇人名立光而殺髙厚以不用仲子之言禍至於此君子謂仲子明於事理詩云聴用我謀庶無大悔仲子之謂也孟姬者華氏之長女齊孝公之夫人也好禮貞一過時不嫁齊中求之禮不備終不徃躡音聶男席語不及外遠别避嫌齊中莫能備禮求焉齊國稱其貞孝公聞之乃修禮親迎于華氏之室父母送孟姬不下堂母醮焦去聲房之中結其衿音今縭音離誡之曰必敬必戒無違宫事父誡之東階之上曰必夙興夜寐無違命其有大妨於王命者亦勿從也諸母誡之兩階之間曰敬之敬之必終父母之命夙夜無怠視之衿縭父母之言謂何姑姊音子妹誡之門内曰夙夜無愆視之衿鞶音盤無忘父母之言孝公親迎孟姬於其父母三顧而出親迎之綏音雖自御輪三曲顧姬與遂納於宫三月廟見而後行夫婦之道既居乆之公遊於琅邪音耶地名華孟姬從車奔姬墮陀去聲車碎孝公使駟馬立車載姬以歸姬使侍御者舒帷以自障音帳蔽而使傅母應使者曰妾聞妃后踰閾音域必乘安車輜音緇軿音萍下堂必從傅母保阿進退則鳴玉環佩内飾則結紐音扭綢音稠繆野處則帷裳擁蔽所以正心一意自歛制也今立車無軿非所敢受命也野處無衛非所敢乆居也二者失禮多矣夫無禮而生不若早死使者馳以告公更取安車比其反也則自經矣傅母救之不絶傅母曰使者至輜軿已具姬氏蘇然後乘而歸君子謂孟姬好禮禮婦人出必輜軿衣服綢繆既嫁歸問女昆弟不問男昆弟所以遠别也詩曰彼君子女綢直如髪其此之謂也齊杞梁殖音寔之妻也齊荘公襲莒殖戰而死荘公歸遇其妻使使者吊之於路杞梁妻曰今殖有罪君何辱命焉若令殖免於罪則賤妾有先人之敝廬在下妾不得與郊吊於是荘公乃還車詣其室成禮然後去杞梁之妻無子内外皆無五屬之親既無所歸乃枕其夫之屍於城下而哭内誠動人道路過者莫不為之揮涕十日而城為之崩既葬曰吾何歸矣夫婦人必有所倚者父在則倚父夫在則倚夫子在則倚子今吾上則無父中則無夫下則無子内無所依以見吾誠外無所倚以見吾節吾豈能更二哉亦死而已遂赴淄音兹水名水而死君子謂杞梁之妻貞而知禮詩云我心傷悲聊與子同歸此之謂也虞姬者名娟之齊威王之姬也威王即位九年不治委政大臣佞臣周破胡專權擅勢嫉賢妬能即墨大夫賢而日毁之阿大夫不肖反日譽之虞姬謂王曰破胡讒諛之臣也不可不退齊有北郭先生者賢明有道可置左右破胡聞之乃惡虞姬曰其幼弱在於閭巷之時嘗與北郭先生通王疑之乃閉虞姬於九層之臺而使有司即窮驗問破胡賂執事者使竟其罪執事者誣其詞而上之王視其詞不合於意乃召虞姬而自問焉虞姬對曰妾姢之幸得䝉先人之遺體生於天壤之間去蓬廬之下侍明王之讌泥附王著薦床蔽席供執掃除掌奉湯沐至今十餘年矣惓惓音拳之心冀幸補一言而為邪臣所擠音虀湮音因於百重之下不意大王乃復而與之語妾聞玉石墜泥不為汙栁下覆寒女不為亂積之於素雅故不見疑也經𤓰田不納履過李園不整冠妾不避此罪一也既䧟難中有司受賂聴用邪人卒見覆冒不能自明妾聞寡婦哭城城為之崩亡士歎市市為之罷誠信𤼵内感動城市妾之寃明於白日雖獨號於九層之内而衆人莫為毫釐妾之罪二也既有汙名而加此二罪義固不可以生所以生者為莫白妾之汙名也且自古有之伯竒放野申生被患孝順至明反以為殘妾既當死不復重陳然願戒大王羣臣為邪破胡最甚王不執政國殆危矣於是王大寤出虞姬顯之於朝市封即墨大夫以萬户烹阿大夫與周破胡遂起兵収故侵地齊國震懼人知烹阿大夫不敢飾非務盡其職齊國大治君子謂虞姬好善詩云既見君子我心則降平聲此之謂也鍾離春者齊無鹽邑之女宣王之正后也其為人極醜無雙臼頭深目長指大節卬音昂鼻結喉肥項少髪折腰出胸皮膚若漆行年四十無所容入衒音縣嫁不售流棄莫執於是乃拂拭音式短褐音曷自詣宣王謂謁者曰妾齊之不售女也聞君王之聖徳願備後宫之掃除頓首司馬門外唯王幸許之謁者以聞宣王方置酒於漸臺左右聞之莫不掩口大笑曰此天下强顔女子也豈不異哉於是宣王乃召見謂之曰昔者先王為寡人娶妃匹皆已備有列位矣今夫人不容于鄉里布衣而欲于萬乘之主亦有何竒能哉鍾離春對曰無有特竊慕大王之美義王曰雖然何喜良乆曰竊嘗喜隱宣王曰隱固寡人之所願也試一行之言未卒忽然不見宣王大驚立𤼵隠書而讀之退而推之又未能得明日更召而問之不以隠對但揚目銜齒舉手拊音府膝曰殆哉殆哉如此者四宣王曰願遂聞命鍾離春對曰今大王之君國也西有衡秦之患南有强楚之讐外有二國之難内聚姦臣衆人不附春秋四十壮男不立不務衆子而務衆婦尊所好忽所恃一旦山陵崩弛音豕社稷不定一殆也漸臺五重黄金白玉琅玕籠疏翡翠珠璣幕絡連飾萬民罷音疲極二殆也賢者匿於山林謟諛强於左右邪偽立於本朝諌者不得通入三殆也飲酒沈湎音免以夜繼晝女樂俳音排優縱音蹤横大笑外不修諸侯之禮内不秉國家之治四殆也故曰殆哉殆哉於是宣王喟然而嘆曰痛乎無鹽君之言乃今一聞於是拆漸臺罷女樂退謟諛去雕琢音卓選兵馬實府庫四辟公門招進直言延及側陋卜擇吉日立太子進慈母拜無鹽君為后而齊國大安者醜女之力也君子謂鍾離春正而有辭詩云既見君子我心則喜此之謂也宿瘤音留女者齊東郭採桑之女閔王之后也項有大瘤故號曰宿瘤初閔王出遊至東郭百姓盡觀宿瘤採桑如故王恠之召問曰寡人出遊車騎甚衆百姓無少長皆棄事來觀汝採桑道傍曽不一視何也對曰妾受父母教採桑不受教觀大王王曰此竒女也惜哉宿瘤女曰婢妾之職屬之不二予之不忘中心謂何宿瘤何傷王大悦之曰此賢女也命後乘載之女曰賴大王之力父母在内使妾不受父母之教而隨大王是奔女也大王又安用之王大慙曰寡人失之又曰貞女一禮不備雖死不從於是王遣歸使使者加金百鎰徃聘迎之父母驚惶欲洗沐加衣裳女曰如是見王則變容更服不見識也請死不徃於是如故隨使者閔王歸見諸夫人告曰今日出遊得一聖女今至斥汝屬矣諸夫人皆恠之盛服而衛遲其至也宿瘤駭宫中諸夫人皆掩口而笑左右失貌不能自止王大慙曰且無笑不飾耳夫飾與不飾固相去十百也女曰夫飾相去千萬尚不足言何獨十百也王曰何以言之對曰性相近也習相遠也昔者堯舜桀紂俱天子也堯舜自飾以仁義雖為天子安於節儉茅茨不剪采柞木也椽不斵音卓後宫衣不重采食不重味至今數千嵗天下歸善焉桀紂不自飾以仁義習為苛文造為高臺深池後宫蹈綺縠音斛弄珠玉意非有饜時也身死國亡為天下笑至今千餘嵗天下歸惡焉由是觀之飾與不飾相去千萬尚不足言何獨十百也於是諸夫人皆大慙閔王大感瘤女以為后出令卑宫室填音田池澤損饍减樂後宫不得重采期月之間化行鄰國諸侯朝之侵三晉懼秦楚一立帝號閔王至於此也宿瘤女有力焉及女死之後燕遂屠齊閔王迯亡而弑死於外君子謂宿瘤女通而有禮詩云菁菁音精者莪在彼中阿既見君子樂且有儀此之謂也孤逐女者齊即墨之女齊相之妻也初逐女孤無父母状甚醜齊相婦死逐女造襄王之門而見謁者曰妾昔三逐於鄉五逐於里孤無父母擯音鬢棄於野無所容止願當君王之盛顔盡其愚辭左右復於王王輟音拙食吐哺音步而起左右曰三逐於鄉者不忠也五逐於里者少禮也不忠少禮之人王何為遽王曰子不識也夫牛鳴而馬不應非不聞牛聲也異類故也此人必有與人異者矣遂見與之語三日始一日曰大王知國之柱乎王曰不知也逐女曰柱相國是也夫柱不正則棟不安棟不安則榱音衰橑音老墮則屋幾覆矣王則棟矣庶民榱橑也國家屋也夫屋堅與不堅在乎柱國家安與不安在乎相今大王既有明知而國相不可不審也王曰諾其二日王曰吾國相奚若對曰王之國相比目之魚也外比内比然後能成其事就其功王曰何謂也逐女對曰朋其左右賢其夫妻是外比内比也其三日王曰吾相其可易乎逐女對曰中才也求之未可得也如有過之者何為不可也今則未有妾聞明王之用人推一而用之故楚用虞丘子而得孫叔敖燕用郭隗桅上聲而得樂毅大王誠能厲之則此可用矣王曰吾用之奈何逐女對曰昔者齊桓公尊九九之人而有道之士歸之越王敬螳音堂蜋音郎之怒而勇士死之葉公好龍而龍為暴下物之所徴固不須頃王曰善遂尊相敬而事之以逐女妻之齊國以治詩云既見君子並坐鼓瑟此之謂也王孫氏之母者齊大夫王孫賈之母也賈年十五事齊閔王國亂閔王出見弑國人不討賊王孫母謂賈曰汝朝出而晚來則吾倚門而望汝莫音暮出而不還則吾倚閭而望今汝事王王出走汝不知其處汝尚何歸乎王孫賈乃入市中而令百姓曰淖音閙齒亂齊國弑閔王欲與我誅之者袒右市人從者四百人與之誅淖齒刺而殺之君子謂王孫母義而能教詩云教誨爾子式榖似之此之謂也魯季敬姜者莒女也號戴已魯大夫公父穆伯之妻文伯之母季康子之從祖叔母也博達知禮穆伯先死敬姜守養文伯出學而還歸敬姜側目而盻之見其友上堂從後堦降而却行奉劒而正履若事父兄文伯自以為成人矣敬姜召而數之曰昔者武王罷朝而結絲􅙋襪同絶左右顧無可使結之者俯而自申之故能成王道桓公坐友三人諌臣五人日舉過者三十人故能成伯音霸業周公一食而三吐哺一沐而三握髪所執贄音至而見於窮閭隘巷者七十餘人故能存周室彼二聖一賢者皆伯王之君也而下人如此其所與遊者皆過已者也是以日益而不自知也今以子年之少而位之卑所與游者皆為服役子之不益亦以明矣文伯乃謝罪於是乃擇嚴師賢友而事之所與遊處者皆黄耄音冒倪齒也文伯引衽壬上聲攘音禳捲而親饋音匱之敬姜曰子成人矣君子謂敬姜備於教化詩曰濟濟多士文王以寧此之謂也文伯相魯退朝朝敬姜敬姜方績文伯曰以歜衝入聲之家而主猶績懼干季孫之怒其以歜為不能事主乎敬姜歎曰魯其亡乎使僮子備官而未之聞邪居吾語汝昔聖王之處民也擇瘠音籍土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民嚮義勞也是故天子大采朝日與三公九卿祖識地徳日中考政與百官之政事師尹維旅牧相宣敬民事少采夕月與太史司載糾音九䖍音乾天刑日入監九御使潔奉禘音弟郊之粢音兹盛而後即安諸侯朝修天子之業命晝考其國政夕省其典刑夜儆百工使無慆音叨淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀卑去聲其家事而後即安士朝而受業晝而講貫夕而習復夜而計過無憾而後即安自庶人已下明而動晦而休無日以怠王后親織𤣥紞貪上聲公侯之夫人加之以紘音宏綖音延卿之内子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事烝而獻功男女効績愆則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕䖏事猶恐忘先人之業况有怠惰其何以避辟吾兾汝朝夕修我曰必無廢先人爾今曰胡不自安以是承君之官余懼穆伯之絶祀也仲尼聞之曰弟子志之季氏之婦不淫矣詩曰婦無公事休其蠶織言婦人以織績為公事者也休之非禮也文伯飲南宫敬叔酒以露堵都上聲父為客羞音脩鼈邊入聲焉小堵父怒相延食鼈堵父辭曰將使鼈長而食之遂出敬姜聞之怒曰吾聞之先子曰祭養尸饗養上賓鼈於人何有而使夫人怒遂逐文伯五日魯大夫辭而復之君子謂敬姜為慎微詩曰我有㫖酒嘉賓式燕以樂言尊賓也文伯卒敬姜戒其妾曰吾聞之好内女死之好外士死之今吾子夭死吾惡其以好内聞也二三婦之辱共祀先祀者請毋瘠色毋揮涕毋搯膺毋憂容有降服毋加服從禮而靜是昭吾子仲尼聞之曰女知莫如婦男知莫如夫公父氏之婦知矣欲明其子之令徳詩曰君子有榖貽音移厥孫子此之謂也敬姜之處喪也朝哭穆伯莫哭文伯仲尼聞之曰季氏之婦可謂知禮矣愛而無私上下有章敬姜嘗如季氏康子在朝與之言不應從之及寢門不應而入康子辭於朝而入見曰肥也不得聞命毋乃罪耶敬姜對曰子不聞耶天子及諸侯合民事於外朝自卿大夫以下合官職於外朝合家事於内朝寢門之内婦人治其職焉上下同之夫外朝子將業君之官職焉内朝子將庀季氏之政焉皆非吾所敢言也康子嘗至敬姜䦱音蒍門而與之言皆不踰閾祭悼音盗子康子與焉酢音昨不受徹俎音祖不讌宗不具不繹繹不盡飫音淤則退仲尼謂敬姜别於男女之禮矣詩曰女也不爽霜上聲此之謂也魯大夫栁下惠之妻也栁下惠處魯三黜而不去憂民救亂妻曰無乃瀆乎君子有二耻國無道而貴耻也國有道而賤耻也今當亂世三黜而不去亦近耻也栁下惠曰油油之民將䧟於害吾能已乎且彼為彼我為我彼雖裸羅上聲裎音呈安能汙我油油然與之處仕於下位栁下既死門人將誄音累之妻曰將誄夫子之徳耶則二三子不如妾知之也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從俗不强察兮蒙耻救民徳彌大兮雖遇三黜終不蔽兮豈開上聲弟君子永能厲兮嗟呼惜哉乃下世兮庶幾遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之諡音示宜為惠兮門人從之以為誄莫能竄攅去聲一字君子謂栁下惠妻能光其夫矣詩曰人知其一莫知其他此之謂也臧孫母者魯大夫臧文仲之母也文仲將為魯使至齊其母送之曰汝刻而無恩好盡人力窮人以威魯國不容子矣而使子之齊凡奸將作必於變動害子者其於斯𤼵事乎汝其戒之魯與齊通壁壁鄰之國也魯之寵臣多怨汝者又皆通於齊髙子國子是必使齊圖魯而拘汝留之難乎其免也汝必施恩布惠而後出以求助焉於是文仲託於三家厚士大夫而後之齊齊果拘之而興兵欲襲魯文仲微使人遺公書恐得其書而謬其辭曰歛小器投諸台食獵犬組羊裘琴之合甚思之臧我羊羊有母食我以同魚冠纓不足帶有餘公及大夫相與議之莫能知之人有言臧孫母者世家子也君何不試召而問焉於是召而語之曰吾使臧子之齊今持書來云爾何也臧孫母泣下襟曰吾子拘有木治矣公曰何以知之對曰歛小器投諸台者言取郭外萌内音納之於城中也食獵犬組羊裘者言趣饗戰鬬之士而繕音善甲兵也琴之合甚思之者言思妻也臧我羊羊有母是蓋告妻善養母也食我以同魚同者其文錯錯者所以治鋸音據鋸者所以治木也是有木治係於獄矣冠纓不足帶有餘者頭亂不得梳飢不得食也故知吾子拘而有木治者於是以臧孫母之言軍於境上齊方𤼵兵將以襲魯聞兵在境上乃還文仲而不伐魯君子謂臧孫母識微見遠詩云陟音職彼屺音起兮瞻望母兮此之謂也魯公乘姒者魯公乘子皮之姊也其族人死姒哭之甚悲子皮止姒曰安之吾今嫁姊矣已過時子皮不復言也魯君欲以子皮為相子皮問姒曰魯君欲以我為相為之乎姒曰勿為也子皮曰何也姒曰夫臨喪而言嫁一何不習禮也後過時而不言一何不達人事也子内不習禮外不達人事子不可以為相子皮曰姒欲嫁何不早言姒曰婦人之事唱而後和吾豈以欲嫁之故數子乎子誠不習於禮不達於人事以此相一國據大衆何以理之譬猶掩目而别黒白也掩目而别黒白猶無患也不達人事而相國非有天咎必有人禍子其勿為也子皮不聴卒受為相居未期年果誅而死君子謂公乘姒縁事而知弟之遇禍也可謂智矣待禮而後動不茍觸衝入聲情可謂貞矣詩云蘀音托兮蘀兮風其吹汝叔兮伯兮唱予和汝又曰百爾所思不如我所之此之謂也伯姬者魯宣公之女成公之妹也其母曰􅓎音穆姜嫁伯姬於宋恭公恭公不親逆伯姬迫於父母之命而行既入宋三月廟見當行夫婦之道伯姬以恭公不親逆故不肯聴命宋人告魯魯使大夫季文子如宋致命於伯姬還復命公享之􅓎姜出于房再拜曰大夫勤勞於遠道辱送小子不忘先君以及後嗣使下而有知先君猶有望也敢再拜大夫之辱伯姬既嫁於恭公十年恭公卒伯姬寡至景公時伯姬常遇夜失火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待保傅來也保母至矣傅母未至也左右又曰夫人少避火伯姬曰婦人之義傅母不至夜不可下堂越義而生不如守義而死遂逮於火而死春秋詳錄其事為賢伯姬以為婦人以貞為行者也伯姬之婦道盡矣當此之時諸侯聞之莫不痛悼以為死者不可以生財物猶可復故相與聚㑹於澶音蟬淵償宋之所喪春秋善之君子曰禮婦人不得傅母夜不下堂行必以燭伯姬之謂也詩云淑慎爾止不愆于儀伯姬可謂不失儀矣晉趙衰音催妻者晉文公之女也號趙姬初文公為公子時與趙衰奔狄狄人入其二女叔隗季隗於公子公以叔隗妻趙衰生盾豚去聲及返國文公以其女趙姬妻趙衰生原同屏括樓嬰趙姬請迎盾與其母而納之趙衰辭而不敢姬曰不可夫得寵而忘舊舍義好新而嫚故無恩與人勤於隘厄富貴而不顧無禮君棄此三者何以使人雖妾亦無以侍執巾櫛詩不云乎采葑采菲無以下體徳音莫違及爾同死與人同寒苦雖有小過猶與之同死而不去况於安新忘舊乎又曰讌爾新婚不我屑以蓋傷之也君其迎之無以新廢舊趙衰許諾乃迎叔隗與盾來姬以盾為賢請立為嫡子使三子下之以叔隗為内婦姬親下之及盾為正卿思趙姬之讓恩請以姬之中子屏括為公族大夫曰君姬氏之愛子也微君姬氏則臣狄人也何以至此成公許之屏括遂以其族為公族大夫君子謂趙姬恭而有讓詩曰温温恭人維徳之基趙姬之謂也晉大夫伯宗之妻也伯宗賢而好以直辯凌人每朝其妻常戒之曰盗憎主人民愛其上有愛好人者必有憎妬人者夫子好直言枉者惡之禍必及身矣伯宗不聴朝而以喜色歸其妻曰子貌有喜色何也伯宗曰吾言於朝諸大夫皆謂我知似陽子妻曰實榖不華至言不飾今陽子華而不實言而無謀是以禍及其身子何喜焉伯宗曰吾欲飲諸大夫酒而與之語爾試聴之其妻曰諾於是為大㑹與諸大夫飲既飲而問妻曰何若對曰諸大夫莫子若也然而民之不能戴其上乆矣難必及子子之仕固不可易也且國家多貳其危可立待也子何不預結賢大夫以託州犂焉伯宗曰諾乃得畢羊而交之及欒不忌之難郤害伯宗讃簪去聲而殺之畢羊乃送州犂于荆遂得免焉君子謂伯宗之妻知天道詩云多將熇熇音壑不可救藥此之謂也叔姬者羊舌子之妻也叔向叔魚之母也一姓楊氏叔向名肸叔魚名鮒音付羊舌子好正不容於晉去而之三室之邑三室之邑人相與攘羊而遺之羊舌子不受姬曰夫子居晉不容去之三室之邑又不容於三室之邑是於夫子不容也不如受之羊舌子受之曰為肸與鮒亨之叔姬曰不可南方有鳥名曰乾吉食其子不擇肉子常不遂今肸與鮒童子也隨大夫而化者不可食以不義之肉不若埋之以明不與於是乃盛以甕翁去聲埋壚音盧隂後二年攘羊之事發都吏至羊舌子曰吾受之不敢食也𤼵而視之則其骨存焉都吏曰君子哉羊舌子不與攘羊之事矣君子謂叔姬為能防害遠疑詩曰無曰不顯莫予云覯音搆此之謂也叔向欲娶於申公巫臣氏夏姬之女美而有色叔姬不欲娶其族叔向曰吾母之族貴而無庶吾懲舅氏矣叔姬曰子靈之妻殺三夫一君一子而亡一國兩卿矣爾不懲此而反懲吾族何也且吾聞之有竒福者必有竒禍有甚美者必有甚惡今是鄭穆少妃姚子之子子貉音鶴之妹也子貉早死無後而天鍾美於是將必以是大有敗也昔有仍氏生女髪黒而甚美光可鑑人名曰𤣥妻樂正夔音逵娶之生伯封實有豕心貪惏音嵐毋期忿戾無饜謂之封豕有窮后羿音義㓕之夔是用不祀且三代之亡及恭太子之廢皆是物也汝何以為哉夫有美物足以移人茍非徳義則必有禍也叔向懼而不敢娶平公强使娶之生揚食我食我號伯碩音石伯碩生時侍者謁之叔姬曰長姒産男叔姬徃視之及堂聞其號也而還曰豺音柴狼音郎之聲也狼子野心今將滅羊舌氏者必是子也遂不肯見及長與祈勝為亂晉人殺食我羊舌氏由是遂滅君子謂叔姬為能推類詩云如彼泉流無淪胥以敗此之謂也叔姬之始生叔魚也而視之曰是虎目而豕喙鳶音縁肩而牛腹谿壑可盈是不可饜也必以賂死遂不見及叔魚長為國贊理邢侯與雍子爭田雍子入其女於叔魚以求直邢侯殺叔魚與雍子於朝韓宣子患之叔向曰三姦同罪請殺其生者而戮其死者遂族邢侯氏而尸叔魚與雍子於市叔魚卒以貪死叔姬可謂智矣詩云貪人敗類此之謂也晉范氏母者范獻子之妻也其三子遊於趙氏趙簡子乘馬園中園中多株問三子曰奈何長者曰明君不問不為亂君不問而為中者曰愛馬足則無愛民力愛民力則無愛馬足少者曰可以三徳使民設令伐株於山將有馬為也已而開囿示之株夫山遠而囿近是民一悦矣去險阻之山而伐平地之株民二悦矣既畢而賤賣民三悦矣簡子從之民果三悦少子伐其謀歸以告母母喟然歎曰終滅范氏者必是子也夫伐功施勞鮮能布仁乘偽行詐莫能乆長其後智伯滅范氏君子謂范氏母為知難本詩曰無忝爾祖式救爾訛此之謂也懷嬴音盈者秦穆之女晉惠公太子之妃也圉音語質音志於秦穆公以嬴妻之六年圉將逃歸謂嬴氏曰吾去國數年子父之接忘而秦晉之友不加親也夫鳥飛反鄉狐死首丘我之首晉而死子其與我行乎嬴氏對曰子晉太子也辱於秦子之欲去不亦宜乎雖然寡君使婢子侍執巾櫛以固子也今吾不足以結子是吾不肖也從子而歸是棄君也言子之謀是負妻之義也三者無一可行雖吾不從子也子行矣吾不敢泄言亦不敢從也子圉遂逃歸君子謂懷嬴善處夫婦之間楚將子𤼵之母也子𤼵攻秦絶糧使人請於王因歸問其母母問使者曰士卒得無恙乎對曰士卒并分菽音叔粒而食之又問將軍得無恙乎對曰將軍朝夕芻豢音患􅎟粱子𤼵破秦而歸其母閉門而不納使人數之曰子不聞越王勾踐之伐呉客有獻醇酒一器王使人注江之上流使士卒飲其下流味不及加美而士卒戰自五也異日有獻一囊糗休上聲糒音敗者王又以賜軍士分食之甘不踰嗌音益而戰自十也今子為將士卒并分菽粒而食之子獨朝夕芻豢􅎟粱何也詩不云乎好樂無荒良士休休言不失和也夫使人入於死地而自康樂於其上雖有以得勝非其術也子非吾子也無入吾門子𤼵於是謝其母然後納之君子謂子𤼵母能以教誨詩云教誨爾子式榖似之此之謂也樊姬楚荘王之夫人也荘王即位好狩獵樊姬諌不止乃不食禽獸之肉王改過勤於政事王嘗聴朝罷晏姬下殿迎曰何罷晏也得無饑倦乎王曰與賢者語不知饑倦也姬曰王之所謂賢者何也曰虞丘子也姬掩口而笑王曰姬之所笑何也曰虞丘子賢則賢矣未忠也王曰何謂也對曰妾執巾櫛十一年遣人之鄭衛求美人進於王今賢於妾者二人同列者七人妾豈不欲擅王之寵愛哉妾聞堂上兼女所以觀人能也妾不能以私蔽公欲王多見知人能也今虞丘子相楚十餘年所薦非子弟則族昆弟未聞進賢退不肖是蔽君而塞賢路知賢不進是不忠不知其賢是不知也妾之所笑不亦可乎王悦明日王以姬言告虞丘子丘子避席不知所對於是避舍使人迎孫叔敖而進之王以為令尹治楚三年而荘王以霸楚史書曰荘王之霸樊姬之力也詩曰大夫夙退無使君勞其君者謂女君也又曰温恭朝夕執事有恪此之謂也楚令尹孫叔敖之母也叔敖為嬰兒之時出遊見兩頭蛇殺而埋之歸見其母而泣焉母問其故對曰吾聞見兩頭蛇者死今者出遊見之其母曰蛇今安在對曰吾恐他人復見之殺而埋之矣其母曰汝不死矣夫有隂徳者陽報之徳勝不祥仁除百禍天之處高而聴卑書不云乎皇天無親惟徳是輔爾嘿音墨矣必興於楚及叔敖長為令尹君子謂叔敖之母知道徳之次詩云母氏聖善此之謂也伯嬴者秦穆公之女楚平王之夫人昭王之母也當昭王時楚與呉為柏舉之戰呉勝楚遂入至郢昭王亡呉王闔音合閭盡妻其後宫次至伯嬴伯嬴持刃曰妾聞天子者天下之表也公侯者一國之儀也天子失制則天下亂諸侯失節則其國危夫婦之道固人倫之始王教之端是以明王之制使男女不親授坐不同席食不共器殊椸音移枷架同異巾櫛所以施之也若諸侯外淫者絶卿大夫外淫者放士庶人外淫者宫割夫然者以為仁失可復以義義失可復以禮男女之失亂亡興焉夫造亂亡之端公侯之所絶天子之所誅也今君王棄儀表之行縱亂亡之欲犯誅絶之事何以行令訓民且妾聞生而辱不若死而榮若使君王棄其儀表則無以臨國妾有淫端則無以生世一舉而兩辱妾以死守之不敢承命且君所欲妾者為樂也近妾而死何樂之有如先殺妾又何益於君王於是呉王慙遂退舍伯嬴與其保阿閉永巷之門皆不釋兵三旬秦救至昭王乃復矣君子謂伯嬴勇而精一詩曰莫莫葛纍施于條枚音梅豈弟君子求福不囘此之謂也貞姜者齊侯之女楚昭王之夫人也王出遊留夫人漸臺之上而去王聞江水大至使使者迎夫人忘持其符使者至請夫人出夫人曰王與宫人約令召宫人必以符今使者不持符妾不敢從使者行使者曰今水方大至還而取符則恐後矣夫人曰妾聞之貞女之義不犯約勇者不畏死守一節而已妾知從使者必生留必死然棄約越義而求生不若留而死耳於是使者取符則水大至臺崩夫人流而死王曰嗟夫守義死節不為茍生處約持信以成其貞乃號之曰貞姜君子謂貞姜有婦節詩云淑人君子其儀不忒此之謂也楚昭越姬者越王勾踐之女楚昭王之姬也昭王燕遊蔡姬在左越姬叅右王親乘駟以馳逐遂登附社之臺以望雲夢之囿觀士大夫逐者既驩乃顧謂二姬曰樂乎蔡姬對曰樂王曰吾願與子生若此死又若此蔡姬曰昔敝邑寡君固以其黎民之役事君王之馬足故以婢子之身為苞苴音疽玩好今乃比於妃嬪固願生俱樂死同時王顧謂史書之蔡姬許從孤死矣乃復謂越姬越姬對曰樂則樂矣然不可乆也王曰吾願與子生若此死若此其不可得乎越姬對曰昔吾先君荘王淫樂三年不聴政事然而能改卒霸天下妾以君王為能法吾先君將改斯樂而勤於政也今則不然而要婢子以死其可得乎且君王以束帛乘馬取婢子於敝邑寡君受之大廟也不約死妾聞之諸姑婦人以死彰君之善益君之寵不聞其以茍從其闇音暗死為榮妾不敢聞命於是王寤敬越姬之言而猶親嬖蔡姬也居二十五年王救陳二姬從王病在軍中有赤雲夾日如飛鳥王問周史史曰是害王身然可以移於將相將相聞之將請以身禱於神王曰將相之於孤猶股肱也今移禍焉庸為去是身乎不聴越姬曰大哉君王之徳以是妾願從王矣昔日之遊淫樂也是以不敢許及君王復於禮國人皆將為君王死而况於妾乎請願先驅狐狸於地下王曰昔之遊樂吾戱耳若將必死是彰孤之不徳也越姬曰昔日妾雖口不言心既許之矣妾聞信者不負其心義者不虛設其事妾死王之義不死王之好也遂自殺王病甚讓位於三弟三弟不聴王薨於軍中蔡姬竟不能死王弟子閭與子西子期謀曰母信者其子必仁乃伏師閉壁迎越姬之子熊章立是為惠王然後罷兵歸葬昭王君子謂越姬信能死義詩曰徳音莫違及爾同死越姬之謂也息君夫人者息君之夫人也楚伐息虜其君使守門將妻其夫人而納之於宫楚王出遊夫人遂出見息君謂之曰人生要一死而已何至自苦妾無須臾而忘君也終不以身更貳醮生離於地上豈如死歸於地下哉乃作詩曰榖則異室死則同穴謂予不信有如皦日息君止之夫人不聴遂自殺息君亦自殺同日俱死楚王賢其夫人守節有義乃以諸侯之禮合而葬之君子謂夫人説於行善故叙之於詩夫義動君子利動小人息君夫人不為利動矣詩云徳音莫違及爾同死此之謂也黎荘夫人者衛侯之女黎荘公之夫人也既徃而不同欲所務者異未嘗得見甚不得意其傅母閔夫人賢公反不納憐其失意又恐其已見遣而不以時去謂夫人曰夫婦之道有義則合無義則去今不得意胡不去乎乃作詩曰式微式微胡不歸夫人曰婦人之道一而已矣彼雖不吾以吾何可以離於婦道乎乃作詩曰微君之故胡為乎中路終執貞一不違婦道以俟君命趙將馬服君趙奢之妻趙括之母也秦攻趙孝成王使括代亷頗為將將行括母上書言於王曰括不可使將王曰何以曰始妾事其父父時為將身所奉飯者以十數所友者以百數大王及宗室所賜幣者盡以與軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏吏無所仰視之者王所賜金帛歸盡藏之乃日視便利田宅可買者王以為若其父乎父子不同執心各異願勿遣王曰母置之吾計已决矣括母曰王終遣之即有不稱妾得無隨坐王曰不也括既行代亷頗三十餘日趙兵果敗括死軍覆王以括母先言故卒不加誅君子謂括母為仁智詩曰老夫灌灌小子蹻蹻音脚匪我言耄音冒爾用憂謔香入聲此之謂也趙津女姢者趙河津吏之女趙簡子之夫人也初簡子南擊楚與津吏期簡子至津吏醉卧不能渡簡子欲殺之姢懼持楫而走簡子曰女子走何為對曰津吏息女妾父聞主君來渡不測之水恐風波之起水神動駭故禱祠九江三淮之神供具備禮御釐音僖受福不勝至祝杯酌餘瀝音歴醉至於此君欲殺之妾願以鄙軀易父之死簡子曰非女之罪也姢曰主君欲因其醉而殺之妾恐其身之不知痛而心不知罪也若不知罪殺之是殺不辜也願醒而殺之使知其罪簡子曰善遂釋不誅簡子將度用楫者少一人姢攘巻操楫而請曰妾願備父持楫簡子曰不榖將行選士大夫齋戒沐浴義不與婦人同舟而渡也姢對曰妾聞昔者湯伐夏左驂牝驪音離右驂牝頻上聲靡而遂放桀武王伐殷左驂牝騏音其右驂牝䮲音黄而遂克紂至於華山之陽主君不欲渡則已與妾同舟又何傷乎簡子悦遂與渡中流為簡子𤼵河激之歌其辭曰升彼河兮面觀清水揚波兮杳㝠㝠禱求福兮醉不醒誅將加兮妾心驚罰既釋兮瀆乃清妾持楫兮操其維蛟龍助兮主將歸呼來櫂棹同兮行勿疑簡子大悦曰昔者不榖夢娶妻豈此女乎將使人祝祓音拂以為夫人姢乃再拜而辭曰夫婦人之禮非媒不嫁嚴親在内不敢聞命遂辭而去簡子歸乃納幣於父母而立以為夫人君子曰女姢通達而有辭詩云來游來歌以矢其音此之謂也曲沃負者魏大夫如耳母也秦立魏公子政為魏太子魏哀王使使者為太子納妃而美王將自納焉曲沃負謂其子如耳曰王亂於無别汝胡不匡之方今戰國强者為雄義者顯焉今魏不能强王又無義何以持國乎王中人也不知其為禍耳汝不言則魏必有禍矣有禍必及吾家汝言以盡忠忠以除禍不可失也如耳未遇間㑹使於齊負因欵王門而上書曰曲沃之老婦也心有所懷願以聞於王王召入負曰妾聞男女之别國之大節也婦人脆音翠於志寙音愈於心不可以邪開也是故必十五而笄音雞二十而嫁早成其號諡所以就之也聘則為妻奔則為妾所以開善遏安入聲淫也節成然後許嫁親迎然後隨從貞女之義也今大王為太子求妃而自納之於後宫此毁貞女之行而亂男女之别也自古聖王必正妃匹妃匹正則興不正則亂夏之興也以塗山亡也以妹喜殷之興也以有㜪音莘亡也以妲丹入聲已周之興也以太姒亡也以褒姒周之康王夫人晏出朝闗雎起興思得淑女以配君子夫睢鳩之鳥猶未嘗見乘居而匹處也夫男女之盛合之以禮則父子生焉君臣成焉故為萬物始君臣父子夫婦三者天下之大綱紀也三者治則治亂則亂今大王亂人道之始棄綱紀之務敵國五六南有從楚西有横秦而魏國居其間可謂僅存矣王不憂此而從亂無别父子同女妾恐大王之國政危矣王曰然寡人不知也遂與太子妃而賜負三十鍾如耳還而爵之王勤行自修勞來國家而齊楚强秦不敢加兵焉君子謂魏負知禮詩云敬之敬之天惟顯思此之謂也代趙夫人者趙簡子之女襄子之姊代王之夫人也簡子既葬襄子未除服北登夏屋誘代王使厨人持斗以食代王及從者行斟隂令宰人各以一斗擊殺代王及從者因舉兵平代地而迎其姊趙夫人夫人曰吾受先君之命事代之王今十有餘年矣代無大故而主君殘之今代已亡吾將奚歸且吾聞之婦人執義無二夫吾豈有二夫哉欲迎我何之以弟慢夫非義也以夫怨弟非仁也吾不敢怨然亦不歸遂泣而呼天自殺於靡音摩笄之地代人皆懷之君子謂趙夫人善處夫婦之間詩云不僣不賊鮮不為則此之謂也陶大夫答子妻也答子治陶三年名譽不興家富三倍其妻數諌不用居五年從車百乘歸休宗人擊牛而賀之其妻獨抱兒而泣姑怒曰何其不祥也婦曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之治國也家貧國富君敬民戴故福結於子孫名埀於後世今夫子不然貪富務大不顧後害妾聞南山有𤣥豹霧雨七日而不下食何也欲以澤其毛而成文章也故藏而遠害犬彘不擇食以肥其身坐而須死耳今夫子治陶家富國貧君不敬民不戴敗亡之徴見矣願與少子俱脱姑怒遂棄之處朞年答子之家果以盗誅唯其母老以免婦乃與少子歸養姑終卒天年君子謂答子妻能以義易利雖違禮求去終以全身復禮可謂遠識矣詩曰百爾所思不如我所之此之謂也蓋之偏將丘子之妻也戎伐蓋殺其君令於蓋羣臣曰敢有自殺者妻子盡誅丘子自殺人救之不得死既歸其妻謂之曰吾聞將節勇而不果生故士民盡力而不畏死是以戰勝攻取故能存國安君夫戰而忘勇非孝也君亡不死非忠也今軍敗君死子獨何生忠孝忘於身何忍以歸丘子曰蓋小戎大吾力畢能盡君不幸而死吾固自殺也以救故不得死其妻曰曩日有救今又何也丘子曰吾非愛身也戎令曰自殺者誅及妻子是以不死死又無益於君其妻曰吾聞之主憂臣辱主辱臣死今君死而子不死可謂義乎多殺士民不能存國而自活可謂仁乎憂妻子而忘仁義背故君而事暴强可謂忠乎人無忠臣之道仁義之行可謂賢乎周書曰先君而後臣先父母而後兄弟先兄弟而後交友先交友而後妻子妻子私愛也事君公義也今子以妻子之故失人臣之節無事君之禮棄忠臣之公道營妻子之私愛偷生茍活妾等耻之况於子乎吾不能與子䝉耻而生焉遂自殺戎君賢之祠以太牢而以將禮葬之賜其弟金百鎰以為卿而使别治蓋君子謂蓋將之妻潔而好義詩云淑人君子其徳不囘此之謂也前漢棠邑侯陳嬰之母也始嬰為東陽令史居縣素信為長者秦二世之時東陽少年殺縣令相聚數千人欲立長帥未有所用乃請陳嬰嬰謝不能遂强立之縣中從之得一萬人欲立嬰為王嬰母曰我為子家婦聞先故不甚貴今㬥得大名不祥不如以兵有所屬事成猶得封侯敗則易以亡可無為人所指名也嬰從其言以兵屬項梁梁以為上柱國後項氏敗嬰歸漢以功封棠邑侯君子曰嬰母知天命又能守先故之業流祚後世謀慮深矣詩曰詒厥孫謀以燕翼子此之謂也丞相安國侯王陵之母也陵始為縣邑豪髙祖微時兄事陵及髙祖起沛陵亦聚黨數千以兵屬漢王項羽與漢為敵國得陵母置軍中陵使至則東嚮坐陵母欲以招陵陵母既而私送使者泣曰為老妾語陵善事漢王漢王長者無以老妾故懷二心言妾已死也乃伏劒而死以固勉陵項羽怒烹之陵志亦感終與髙祖定天下位至丞相封侯𫝊爵五世君子謂王陵母能棄身立義以成其子詩云我躬不閲遑恤我後終身之仁也陵母之仁及五世矣齊太倉女者漢太倉令淳于公之少女也名緹音題縈淳于公無男子有女五人孝文皇帝時淳于公有罪當刑是時肉刑尚在詔獄繫長安當行㑹逮公罵其女曰生子不生男緩急非有益緹縈自悲泣而隨其父至長安上書曰妾父為吏齊中皆稱亷平今坐法當刑妾傷死者不可復生刑者不可復屬音燭雖欲改過自新其道無由也妾願入身為官婢以贖父罪使得自新書奏天子憐悲其意淳于公遂得免焉君子謂緹縈一言𤼵聖主之意可謂得事之宜矣京兆尹雋不疑之母也仁而善教不疑為京兆尹行縣錄囚徒還其母輒問所平反活幾何人即不疑多所平反母喜笑飲食言語異於他時或無所出母怒為之不食由是故不疑為吏嚴而不殘君子謂不疑母能以仁教詩云昊天疾威敷于下土言天道好生疾威虐之行于下土也楊夫人者漢丞相安平侯楊敞長上聲之妻也漢昭帝崩昌邑王賀即帝位淫亂大將軍霍光與車騎將軍張安世謀欲廢賀更立帝議已定使大司農田延年報敞敞驚懼不知所言汗出浹背徒曰唯唯而已延年出更衣夫人遽從東廂謂敞曰此國之大事今大將軍議已定使九卿來報君侯君侯不疾應與大將軍同心猶與無决先事誅矣延年更衣還敞夫人與延年參語許諾請奉大將軍教令遂共廢昌邑立宣帝居月餘敞薨益封三千五百户君子謂敞夫人可謂知事之機者矣詩云辰彼碩女令徳來教此之謂也河南太守東海嚴延年之母也生五男皆有吏材至二千石東海號曰萬石嚴嫗延年為河南太守所在名為嚴能冬月𫝊屬縣囚論府下流血數里河南號曰屠伯其母常從東海來欲就延年臘到洛陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母閉閤不見延年免冠頓首閤下母乃見之因責數延年曰幸備郡守不聞仁義教化有以全安愚民顧乘刑罰多刑殺人欲以致威豈為民父母之意哉延年服罪頓首謝因為御歸府舍母畢正臘已謂延年曰天道神明人不可獨殺我不自意老當見壮子被刑戮也行矣去汝東歸掃除墓地耳遂去歸郡見昆弟宗族復為言之後嵗餘而府丞所章結延年罪名十事下御史按騐遂棄延年於市東海莫不稱母賢智君子謂嚴母仁智信道詩云心之憂矣寧自全矣嚴母之謂也後漢梁夫人嫕音翳者梁竦音聳之女樊調之妻漢孝和皇帝之姨恭懷皇后之同産姊也初恭懷后以選入掖庭進御于孝章皇帝有寵生和帝立為太子竇后母養焉和帝之生梁氏喜相慶賀聞竇后竇后驕恣欲專恣害外家乃誣䧟梁氏時竦在本郡安定詔書収殺之家屬移九真後和帝立竇后崩諸竇以罪惡誅放嫕從民間上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸皇天授命育生明聖託體陛下為竇憲兄弟所譛訴而破亡父竦寃死牢獄體骨不掩老母孤弟遠徙萬里獨妾脱身竄伏草野嘗恐歿命無由自達今遭陛下神聖之徳攬統萬機憲兄弟奸惡伏誅海内曠然各得其所妾幸蘇息拭目更視敢昧死自陳父既湮沒不可復生母埀年七十弟棠等遠在絶域不知死生願乞母弟還本郡収葬竦枯骨妾聞文帝即位薄氏蒙榮宣帝繼統史氏復興妾自悲既有薄史之親獨不得蒙外戚餘恩章既上天子感悟使中常侍掖庭令雜訊問知事明審引見嫕等上泣涕賞賜累億嫕既素有節行又首建此事上甚寵之稱梁夫人擢嫕夫樊調為郎中遷羽林郎將恭懷后遂乃改殯賔去聲於承光宫葬西陵追諡竦為褒親愍民上聲侯徵還母及弟等棠既到皆封侯食邑五千户君子謂梁夫人以哀辭𤼵家門悟時主榮父之魂還母萬里為家門開三國之祚使天子成母子之禮詩云世之不顯厥猶翼翼思皇多士生此王國此之謂也漢中程文矩妻者同郡李法之姊也字穆姜有二男而前妻四子文矩為安衆令喪於官四子以母非所生憎毁日積而穆姜慈愛温仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不别居以遠之對曰吾方以義相導使其自遷善也及前妻長子興遇疾困篤母惻隠自然親調藥膳恩情篤密興疾乆乃瘳於是呼三弟謂曰繼母慈仁出自天授吾兄弟不識恩養禽獸其心雖母道益隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之徳状已之過乞就刑辟縣言之於郡郡守表異其母蠲音㳙除家徭遣散四子許以修革自後訓導愈明並為良士穆姜年八十餘卒臨終勑諸子曰吾弟伯度智達士也所論薄葬其義至矣又臨亡遺令賢聖法也令汝曹遵承勿與俗同増吾之累諸子奉行焉安定皇甫規妻者不知何氏女也規初喪室家後更娶之妻善屬文能草書時為規答書記衆人恠其工及規卒時妻年猶盛而容色美後董卓為相國承其名聘以輧輜百乘馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳請辭甚酸愴卓使傅奴侍者悉㧞刀圍之而謂曰孤之威教欲令四海風靡何有不行於一婦人乎妻知不免乃立罵卓曰君殘暴之人毒害天下猶未足耶妾之先人清徳奕世皇甫氏文武上才為漢忠臣君親非其趣使走吏乎敢欲行非禮於爾君夫人耶卓乃引車庭中以其頭懸軶音戹鞭撲交下妻謂持杖者曰何不重乎速盡為惠遂死車下後人圖畫號曰禮宗云晉陶侃母湛氏豫章新淦音紺人也初侃父丹聘為妾生侃而陶氏貧賤湛氏每紡績資給之使交結勝已侃少為潯陽縣吏嘗監魚梁以一坩音甘鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非唯不能益吾乃以増吾憂矣鄱陽孝亷范逵寓宿於侃時大雪湛氏乃徹所卧新薦自剉音莝給其馬又密截千入聲髪賣與鄰人供肴饌逵聞之歎息曰非此母不生此子後侃竟以功名顯梁緯妻辛氏隴西狄道人也緯為散騎常侍西都䧟沒為劉曜所害辛氏有殊色曜將妻之辛氏據地大哭仰謂曜曰妾聞男以義烈女不再醮妾夫已死理無獨全且婦人再辱明公亦安用哉乞即就死下事舅姑遂號哭不止曜曰貞婦也任之乃自縊而死曜以禮葬之虞潭母孫氏呉郡富春人孫權族孫女也初適潭父忠恭順貞和甚有婦徳及忠亡遺孤藐音眇爾孫氏雖少誓不改節躬自撫養劬音瞿勞備至性聦敏識鑒過人潭始自幼童便訓以忠義故得聲望允洽為朝廷所稱永嘉未潭為南康太守值杜弢音滔構逆率衆討之孫氏勉潭以必死之義俱傾其資産以餽戰士潭遂尅捷蘇峻作亂潭時守呉興又假節征峻孫氏戒之曰吾聞忠臣出孝子之門汝當捨生勿以吾老為慮也仍盡𤼵其家僮令隨潭助戰貿音茂其所服環佩以為軍資于時㑹稽内史王舒遣子允之為督䕶孫氏又謂潭曰王府君遣兒征汝何為獨不潭即以子楚為督䕶與允之合勢其憂國之誠如此拜武昌候太夫人加金章紫綬潭立養堂於家王導以下皆就拜謁咸和末卒年九十五成帝遣使弔祭諡曰定夫人隋鄭善果母崔氏者清河人也年十三適滎陽鄭誠生善果周末誠討尉遲迥力戰死于陣母年二十而寡父彦睦欲奪其志母抱善果曰婦人無再見男子之義且鄭君雖死幸有此兒棄兒為不慈背死夫為無禮寧當割耳剪髪以明素心違禮滅慈非敢聞命善果以父死王事年數嵗拜使持節大將軍襲爵開封縣公開皇初進封武徳郡公年十四授沂州刺史轉景州刺史尋為魯郡太守母性賢明有節操博涉書史通曉政事每善果出聴事母輒坐胡牀於障後察之聞其剖㫁合禮歸則大悦即賜之坐相對談笑若行事不允或妄瞋怒母乃還堂蒙袂而泣終日不食善果伏於牀前不敢起母方起謂之曰吾非怒汝乃愧汝家耳吾為汝家婦獲奉灑掃知汝先君忠勤之士也守官清恪未嘗問私以身徇國繼之以死吾亦望汝副其此心汝既年小而孤吾寡婦耳有慈無威使汝不知禮訓何可負荷忠臣之業乎汝自童子承襲茅土位至方伯豈汝身致之邪安可不思此事而妄加瞋怒心縁驕樂墮於公政内則墜爾家風或亡失官爵外則虧天子之法以取罪戾吾死之日亦何面目見汝先人於地下乎母恒自紡績夜分而寐善果曰兒封侯開國位居三品秩俸幸足母何自勤如是耶答曰嗚呼汝年已長吾謂汝知天下之理今聞此言故猶未也至於公事何由濟乎今此秩俸乃是天子報爾先人之徇命也當須散贍六姻為先君之惠妻子奈何獨擅其利以為富貴哉又絲枲紡織婦人之務上自王后下至大夫士妻各有所製若墮業者是為驕逸吾雖不知禮其可自敗名乎自初寡便不御脂粉常服大練性又節儉非祭祀賔客之事酒肉不妄陳於前靜室端居未嘗輒出門閤内外姻戚有吉凶事但厚加贈遺皆不詣其家非自手作及荘園禄賜所得雖親族禮遺悉不許入門善果歴任州郡惟内自出饌於衙中食之公𪠘所供皆不許受悉用修治𪠘宇及分給寮佐善果亦由此克已號為清吏煬帝遣御史大夫張衡勞之考為天下最徴授光禄卿其母卒善果為大理卿漸驕恣清公平允遂不如疇昔焉裴倫妻河東栁氏女也少有風訓大業末倫為渭源令屬薛舉之亂縣城為賊所䧟倫遇害栁時年四十有二女及兒婦三人皆有美色栁氏謂之曰我輩遭逢禍亂汝父已死我自念不能全汝我門風有素義不受辱於羣賊我將與汝等同死如何其女等皆埀泣曰唯母所命栁氏遂自投于井其女及婦相繼而下皆重死於井中唐李徳武妻裴氏字淑英户部尚書安邑公矩之女也性婉順有容徳事父母以孝聞適徳武經一年而徳武坐事徙嶺表矩時為黄門侍郎奏請徳武離婚煬帝許之徳武將與裴别謂曰嬿音燕婉音宛始爾便事分離方遠投瘴音帳癘音例恐無還理尊君奏留必欲改嫁耳於此即事長訣矣裴泣而對曰婦人事夫無再醮之禮夫者天也何可背乎守之以死必無他志因操刀欲割耳自誓保者禁之乃止裴與徳武别後容貌毁悴音萃常讀佛經不御膏澤李氏之姊妹在都邑者嵗時朔望必命左右致敬而省焉嘗讀列女傳見稱述不改嫁者乃謂所親曰不踐二庭婦人常理何為以此載於記傳乎後十餘年間與徳武音信㫁絶矩欲奪其志時有栁直求婚許之期有定日乃以剪刀斷其髪悲泣絶粒矩不可奪乃止徳武已於嶺表娶爾朱氏為妻及遇赦得還至襄州聞裴守節乃出其後妻為夫婦如初楚王靈龜妃上官氏秦州上邽音圭人父懷仁右金吾將軍上官年十八歸于靈龜繼楚哀王後而舅姑具存朝夕侍奉恭謹彌甚凡有新味非經獻不先嘗靈龜薨將葬前妃閻氏嫁不踰年而卒又無近族衆議欲不舉之上官氏曰逝者有知魂可無託乎乃備禮合葬聞者嘉歎服除諸兄姊謂曰妃年尚少又無所生改醮異門禮儀常範妃可思之妃掩泣對曰丈夫以義烈標名婦人以守節為行未能即先犬馬以徇溝壑寧可復飾粧服有他志乎遽將截鼻割耳以自誓諸兄姊知其志不可奪歎息而止尋卒髙叡音鋭妻秦氏女也叡為趙州刺史為黙啜所攻州䧟叡仰藥不死夫妻至黙啜所示以寶帶異袍曰降我賜爾官不降且死叡視秦秦曰君受天子恩當以死報賊一品官何足榮自是皆瞑目不語黙啜知不可屈乃殺之楊烈婦者李侃妻也建中末李希烈謀襲陳州侃為項城令以城小賊鋭欲逃去婦曰君而逃尚誰守侃曰兵少財乏若何婦曰縣不守則地賊地也倉廩府庫皆其積也百姓皆其戰士也於國家何有請重賞募死士尚可濟侃乃召吏民入庭中曰宜相與死守衆泣許諾得數百人侃率以乘城婦身自㸑以享衆侃中流矢還家婦責曰君不在人誰肻固死於外猶愈于牀也侃遽登城㑹賊將中矢遂引去縣卒完君子謂楊烈婦忼慷知君臣大義云董昌齡母楊氏昌齡嘗為泗州長史世居于蔡少孤受訓於母累事呉少誠少陽至元濟時為呉房令母常密誡曰逆順成敗兒可圖之昌齡未决元濟又署為郾偃同城令楊復誡曰逆黨欺天天所不福汝當速降無以前敗為慮無以老母為念汝為忠臣吾雖沒無恨矣及王師逼郾城昌齡乃以城降且説賊將鄧懷金歸欵於李光顔憲宗聞之喜急召昌齡至闕即拜郾城令兼監察御史昌齡謝曰此皆老母之訓憲宗嗟歎良乆元濟囚楊氏欲殺之而止者數矣蔡平楊氏幸無恙元和十五年陳許節度使李遜疏楊氏之强明節義以聞乃封北平郡太君五代王凝妻李氏凝家青齊之間為虢州司户叅軍以疾卒於官凝家素貧一子尚幼李氏携其子負其遺骸以歸東過開封止旅舍旅舍主人見其婦人獨携一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執邪不可以一手并汙吾身即引斧自㫁其臂路人見者環聚而嗟之或為彈指或為之泣下開封尹聞之白其事于朝官為賜藥封瘡厚䘏李氏而笞其主人宋諌議大夫陳省華娶馮氏生三子堯叟堯佐堯咨真宗時皆登進士第皆累遷至顯貴堯咨善射自號小由基為荆南太守秩滿歸謁其母母曰爾典名藩有何異政對曰州當孔道過客以兒善射莫不歎服母曰忠孝以輔國爾父之訓也爾不務行仁政以善化民顧專卒伍一夫之伎豈父之訓哉因擊以杖而堯咨金魚墜于地世稱馮氏善教子有孟母之風焉謝枋音柄得之妻李氏饒州安仁人也色美而慧通女訓諸書嫁枋得事舅姑奉祭待賔皆有禮枋得起兵守安仁兵敗逃入閩中武萬户以枋得豪傑恐有扇變購音構捕之根及其家人李氏携二子匿貴溪山荆棘中採草木而食至元十四年冬信兵蹤跡至山中令曰茍不獲李氏屠而墟李聞之曰豈可以我故累人吾出事塞矣遂就俘明年徙囚建康或指李言曰是當沒入矣李聞之撫二子凄然而泣左右曰雖沒入將不失為官人妻何泣也李曰吾豈可嫁二夫邪顧謂二子曰若幸生還善事吾姑吾不得終養矣是夕解裙帶自經獄中死元闞音瞰文興妻王氏名楚楚建康人也文興從軍漳州為其萬户府知事王氏與俱行至元十七年陳吊眼作亂攻漳州文興率兵與戰死之王氏被掠義不受辱乃紿音駘賊曰俟吾葬夫即汝從也賊許之遂脱得負屍還積薪焚之火既熾遲去聲即自投火中死至順三年事聞贈文興侯爵諡曰英烈王氏曰貞烈夫人有司為立廟祀之號雙節云馮氏名淑安字靜君大名宦家女山隂縣尹山東李如忠繼室也如忠初娶䝉古氏生子任數嵗而卒大徳五年如忠病篤謂馮曰吾已矣其奈汝何馮氏引刀㫁髪自誓不他適如忠歿兩月遺腹生一子名伏李氏及蒙古氏之族在北聞如忠歿於官家多遺財相率來山隂馮氏方病乘間取其貲及子任以去馮不與較一室蕭然惟餘如忠及蒙古氏之柩而已朝夕哭泣隣里不忍聞乆之鬻衣權厝音措二柩蕺音集山下携其子廬墓側時年始二十二羸音纍形苦節為女師以自給父母來視之憐其孤苦欲使更事人馮爪面流血不肯從居二十年始䕶喪歸葬汶上齊魯之人聞之莫不歎息國朝韓太初妻劉氏真定新樂縣人太初仕元為顯官洪武七年家徙和州劉氏奉其姑寗至南宫縣姑仆音赴地傷其腰劉氏籲音裕天刺臂血和湯以進遂愈至𤓰洲姑復病再進再愈至和州鬻蔬以供養無違禮又二年姑患風疾不能起時盛暑劉氏晝夜驅蠅蚊不怠蛆音沮生枕席囓音臬其蛆蛆不復生姑病隨愈後除夕姑忽病危囓劉氏小指意與之永訣劉氏不悟明旦斬指滴血和粥以進姑病逾旬復愈越月而卒劉氏遵遺命殯之淺土俟歸葬舊塋音營五年而弗果哀號常如袒括之日事聞上召至京厚賜之官送寗氏喪歸葬新樂旌門復其役燕山中䕶衛指揮使費愚妾朱氏愚乆患風疾不愈一日醉語其妻妾曰我死誰與俱徃朱氏遽應曰妾願徃及愚卒朱氏即自經死事聞上嘉其節義命賜誥視正妻降等贈之古今列女傳巻二
