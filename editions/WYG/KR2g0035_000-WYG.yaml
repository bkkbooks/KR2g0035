body:
  text: 古今列女傳傳記類三總録之屬提要臣等謹案古今列女傳三巻明解縉等奉勅撰先是明太祖孝慈皇后馬氏每聴女史讀書至列女傳謂宜加討論因請於帝命儒臣攷訂未就永樂元年成祖既追上馬后尊諡册寳仁孝皇后徐氏復以此書為言因命縉及黄淮胡廣胡儼楊榮金幼孜楊士竒王洪蒋驥沈度等同加編輯書成上進帝自製序文刋印頒行上巻皆厯代后妃中巻諸侯大夫妻下巻士庶人妻時徐后作貞烈事實以闡幽㣲顯頗留意於風教故諸臣編輯是書稍為經意不似五經四書大全之潦草所錄事蹟起自有虞迄于元明漢以前多本之劉尚書後代則畧取各史列女傳而以明初人附益之去取頗見審慎盖在明代官書之中猶為善本此為秀水項元汴家所藏猶明内府初刋之板黄虞稷千頃堂書目稱此書成於永樂元年十二月今考成祖御製序實題九月朔旦知虞稷未見原書僅據傳聞著錄矣乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀古今列女傳原序朕聞惟天下至誠為能經綸天下之大經立天下之大本知天地之化育大經者五品之人倫也大哉經綸之道乎而以人倫為本人之大倫有五而男女夫婦為先有夫婦而後有父子有父子而後有君臣妃匹之際生民之始萬福之原經訓之作皆載之首篇聖帝明王相傳之要道豈有加於此哉是故唐虞逺矣三代莫盛於周太王王季肇建邦家文王誕膺天命以撫方夏武王周公修太平之業姜任繼美姒續徽音輔成闗雎麟趾之化朕嘗求之豳風觀其習俗之羙家人婦子驩然有恩粲然有文饁田畝為酒食治蠶績供衣裳以奉獻祭實二南之權輿也及乎周南后妃貴而勤富而儉長而敬不㢮於師傅嫁而孝不衰於父母樂而不滛憂而不傷逮下而有螽斯之祥仁厚而致麟趾之應雍雍乎熙熙乎漢廣汝墳咸被其化端荘静一無狎眤之私離别告語皆忠厚之意何其盛也盖古必有女師之官所以教之之具委曲詳盡皆著於書周衰散佚今内則諸篇寂寥數言而巳近世有欲復古者相承述作其説浸廣獨劉向輯古列女傳上自后妃下逮士庶人之妻惓惓忠愛之意欲以感悟其君其意亦美矣惜其傳乆殽亂南豐曽鞏已不得其詳論其乖異而曰覽者擇其是非向之分類尤不能無議者有虞二妃而冠之母儀之篇謂之何哉向之失不至此其亦未成之書歟朕自少時伏覩皇考修身齊家皇妣輔治同德訓飭整齊委曲詳盡古人之遺意復見於今日皇妣毎聴女史讀書至列女傳謂宜加討論刪定為書永作世範請於皇考命儒臣考正有緒未就皇妣違榮皇考毎歎息悲傷其意竟未及成書永樂元年六月朕既上冊寳尊諡皇考聖神文武欽明啓運俊徳成功統天大孝髙皇帝皇妣孝慈昭憲至仁文徳承天順聖髙皇后纂成實録宫壼復申皇妣之意朕不敢違乃命儒臣編次古今后妃諸侯大夫士庶人妻之事分為三巻頒之六宮行之天下俾為師氏知所以教而閨門知所以學庶修身者不至以家自累而内外有以相成全體經綸之功大復虞周之盛以知天地之化衍闗雎麟趾之風朕於是書實有望焉永樂元年九月朔旦御製
